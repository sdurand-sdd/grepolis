<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Alliance Tracker - Delta Evolution</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        h1 { color: var(--primary); text-align: center; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr auto; 
            gap: 20px; 
            margin: 25px 0; 
            padding: 20px; 
            background: #f8f9fa; 
            border-radius: 8px;
            align-items: end;
        }

        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; font-size: 0.9em; }
        select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: white; font-size: 14px; }
        
        button { 
            background: var(--accent); color: white; border: none; padding: 10px 25px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        button:hover { background: #2980b9; }

        .status-bar { padding: 10px; margin-bottom: 20px; border-radius: 6px; font-size: 0.9em; text-align: center; }
        .loading { background: #fff3cd; color: #856404; }
        .ready { background: #d4edda; color: #155724; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background: #fafafa; }
        
        .delta-badge { 
            padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.9em;
        }
        .plus { background: #d4edda; color: var(--success); }
        .minus { background: #f8d7da; color: var(--danger); }
        .neutral { background: #e2e3e5; color: #666; }

        .info-towns { font-size: 0.85em; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ Analyseur de Croissance Alliance</h1>
    
    <div id="status" class="status-bar loading">Initialisation des fichiers...</div>

    <div class="controls">
        <div>
            <label>Période de comparaison (Archives)</label>
            <select id="archiveSelect">
                <option value="_2025_W48">novembre 2025 (Semaine 01)</option>
                <option value="_2025_W52">décembre 2025 (Semaine 02)</option>
                <option value="_2026_09">Février 2026 (Semaine 03)</option>
                <option value="_01">Archive test _01</option>
            </select>
        </div>
        <div>
            <label>Choisir l'Alliance cible</label>
            <select id="allianceSelect" disabled>
                <option>Chargement...</option>
            </select>
        </div>
        <button id="btnCalculate">Comparer</button>
    </div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>Joueur</th>
                <th>Villes (Archive)</th>
                <th>Villes (Aujourd'hui)</th>
                <th>Évolution (Delta)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    // Chemins des fichiers
    const FILE_CONFIG = {
        alliances: 'alliances.txt',
        playersCurrent: 'players.txt',
        archiveFolder: 'archives/' // Dossier des archives
    };

    let currentPlayers = {};
    let alliances = {};

    function clean(str) {
        return str ? decodeURIComponent(str.replace(/\+/g, ' ')) : "";
    }

    // Chargement des données au démarrage
    async function loadInitialData() {
        try {
           // 1. Charger Alliances
const resAli = await fetch(FILE_CONFIG.alliances);
const textAli = await resAli.text();
const aliSelect = document.getElementById('allianceSelect');
aliSelect.innerHTML = '<option value="">-- Sélectionner --</option>';

// On crée d'abord une liste (array) pour pouvoir la trier
let listAli = [];

textAli.split('\n').forEach(line => {
    const d = line.split(',');
    if(d.length > 5) {
        listAli.push({
            id: d[0],
            name: clean(d[1]),
            members: d[4]
        });
    }
});

// --- LE TRI PAR ORDRE ALPHABÉTIQUE ---
listAli.sort((a, b) => a.name.localeCompare(b.name));
// -------------------------------------

// On remplit maintenant le menu avec la liste triée
listAli.forEach(ali => {
    alliances[ali.id] = ali.name;
    let opt = document.createElement('option');
    opt.value = ali.id;
    opt.textContent = `${ali.name} (${ali.members} membres)`;
    aliSelect.appendChild(opt);
});

aliSelect.disabled = false;

            // 2. Charger Joueurs Actuels
            const resPl = await fetch(FILE_CONFIG.playersCurrent);
            const textPl = await resPl.text();
            textPl.split('\n').forEach(line => {
                const d = line.split(',');
                if(d.length > 5) {
                    currentPlayers[d[0]] = {
                        name: clean(d[1]),
                        aliId: d[2],
                        towns: parseInt(d[5])
                    };
                }
            });

            const status = document.getElementById('status');
            status.innerText = "✅ Données actuelles prêtes. Prêt pour l'analyse.";
            status.className = "status-bar ready";

        } catch (e) {
            document.getElementById('status').innerText = "❌ Erreur : Vérifiez la présence de alliances.txt et players.txt";
            console.error(e);
        }
    }

    // Logique de comparaison
    document.getElementById('btnCalculate').onclick = async function() {
        const selectedAli = document.getElementById('allianceSelect').value;
        const archiveSuffix = document.getElementById('archiveSelect').value;

        if(!selectedAli) return alert("Sélectionnez d'abord une alliance.");

        document.getElementById('status').innerText = "Lecture de l'archive...";
        
        try {
            // Cherche dans le sous-dossier /archives/
            const resArch = await fetch(`${FILE_CONFIG.archiveFolder}players${archiveSuffix}.txt`);
            if(!resArch.ok) throw new Error("Fichier archive introuvable");
            
            const textArch = await resArch.text();
            let archData = {};
            textArch.split('\n').forEach(line => {
                const d = line.split(',');
                if(d.length > 5) archData[d[0]] = parseInt(d[5]);
            });

            // Calcul
            let results = [];
            for (let id in currentPlayers) {
                let p = currentPlayers[id];
                if (p.aliId === selectedAli) {
                    let oldVal = archData[id] || 0;
                    results.push({
                        name: p.name,
                        old: oldVal,
                        now: p.towns,
                        delta: p.towns - oldVal
                    });
                }
            }

            // Tri (les plus grosses progressions en haut)
            results.sort((a, b) => b.delta - a.delta);

            // Rendu du tableau
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = "";
            results.forEach(r => {
                const badgeClass = r.delta > 0 ? 'plus' : (r.delta < 0 ? 'minus' : 'neutral');
                const sign = r.delta > 0 ? '+' : '';
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${r.name}</strong></td>
                        <td class="info-towns">${r.old} villes</td>
                        <td class="info-towns">${r.now} villes</td>
                        <td><span class="delta-badge ${badgeClass}">${sign}${r.delta}</span></td>
                    </tr>
                `;
            });

            document.getElementById('resultTable').style.display = 'table';
            document.getElementById('status').innerText = `Analyse terminée pour ${alliances[selectedAli]}`;
            document.getElementById('status').className = "status-bar ready";

        } catch (e) {
            alert("Erreur : Le fichier archives/players" + archiveSuffix + ".txt est introuvable.");
            document.getElementById('status').innerText = "Erreur de chargement d'archive.";
        }
    };

    loadInitialData();
</script>

</body>
</html>
