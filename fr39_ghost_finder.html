<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grepolis - Ghost Finder</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        .map-container { cursor: grab; touch-action: none; }
        .map-container:active { cursor: grabbing; }
        .distance-line { stroke-dasharray: 5,5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
        .map-wrapper { height: 100%; min-height: 35vh; }
        @media (max-width: 767px) { 
            .sidebar { max-height: 55vh; width: 100%; }
            .main-content { overflow-y: auto; display: flex; flex-direction: column; }
            .map-wrapper { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="root" class="main-content h-screen"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useEffect, useRef } = React;

        const calculateDistance = (x1, y1, x2, y2) => {
            return Math.sqrt(Math.pow(x1 - x2, 2) + Math.pow(y1 - y2, 2)).toFixed(2);
        };

        const getGrepolisOcean = (x, y) => {
            const oceanX = Math.floor(x / 100).toString(); 
            const oceanY = Math.floor(y / 100).toString();
            return oceanX.padStart(1, '0') + oceanY.padStart(1, '0'); 
        };
        
        const decodeName = (str) => {
            if (!str) return str;
            try {
                return decodeURIComponent(str.trim().replace(/\+/g, ' '));
            } catch (e) {
                return str.trim().replace(/\+/g, ' ');
            }
        };

        const parseData = (text, headers) => {
            const lines = text.trim().split('\n').filter(line => line.trim() !== '' && !line.startsWith('#'));
            if (lines.length === 0) return [];
            
            return lines.map(line => {
                const values = line.split(','); 
                const obj = {};
                headers.forEach((header, i) => {
                    const value = values[i];
                    const isNumeric = (header.endsWith('_id') || ['id', 'x', 'y', 'points', 'island_pos', 'towns', 'members', 'rank', 'off_rank', 'off_points', 'def_rank', 'def_points'].includes(header));
                    obj[header] = isNumeric ? (Number(value) || 0) : decodeName(value);
                });
                if (Object.keys(obj).length !== headers.length) return null;
                return obj;
            }).filter(obj => obj !== null);
        };

        const fetchData = async () => {
            try {
                const [alliancesRes, playersRes, townsRes, updateRes] = await Promise.all([
                    fetch('alliances.txt'),
                    fetch('players.txt'),
                    fetch('towns.txt'),
                    fetch('last_update.txt'),
                ]);

                if (!alliancesRes.ok || !playersRes.ok || !townsRes.ok) {
                    throw new Error("Erreur de chargement des fichiers serveurs.");
                }

                const [alliancesText, playersText, townsText, updateText] = await Promise.all([
                    alliancesRes.text(),
                    playersRes.text(),
                    townsRes.text(),
                    updateRes.ok ? updateRes.text() : 'Date inconnue',
                ]);

                const alliancesHeaders = ['id', 'name', 'points', 'towns', 'members'];
                const playersHeaders = ['id', 'name', 'alliance_id', 'points', 'rank', 'towns', 'off_rank', 'off_points', 'def_rank', 'def_points'];
                const townsHeaders = ['id', 'player_id', 'name', 'x', 'y', 'island_pos', 'points']; 

                const alliances = parseData(alliancesText, alliancesHeaders);
                const players = parseData(playersText, playersHeaders);
                const towns = parseData(townsText, townsHeaders);
                
                const lastUpdate = updateText.trim().split('\n')[0];

                const allianceMap = new Map(alliances.map(a => [a.id, a]));
                const playerMap = new Map(players.map(p => [p.id, {
                    ...p,
                    alliance_name: allianceMap.get(p.alliance_id)?.name || 'Sans alliance',
                    alliance_members: allianceMap.get(p.alliance_id)?.members || 0
                }]));

                const mergedCities = towns.map(town => {
                    if (town.points === 0) return null;

                    if (town.player_id === 0) {
                        return {
                            ...town,
                            ocean: getGrepolisOcean(town.x, town.y),
                            player_name: 'Ville Fantôme',
                            isGhost: true,
                            alliance_name: 'Aucune',
                            player_points: 0
                        };
                    }

                    const player = playerMap.get(town.player_id);
                    if (!player) {
                        return {
                            ...town,
                            ocean: getGrepolisOcean(town.x, town.y),
                            player_name: 'Joueur inconnu',
                            isGhost: true,
                            alliance_name: 'Aucune',
                            player_points: 0
                        };
                    }

                    return {
                        ...town,
                        ocean: getGrepolisOcean(town.x, town.y), 
                        player_name: player.name,
                        player_id: player.id,
                        player_points: player.points,
                        player_towns_count: player.towns,
                        alliance_id: player.alliance_id,
                        alliance_name: player.alliance_name,
                        alliance_members: player.alliance_members,
                        player_off_points: player.off_points,
                        player_def_points: player.def_points,
                        isGhost: false
                    };
                }).filter(c => c !== null);

                return { mergedCities, alliances, lastUpdate };

            } catch (error) {
                console.error(error);
                throw new Error("Erreur lors de la récupération des fichiers.");
            }
        };

        // --- COMPOSANT PRINCIPAL ---

        const GrepolisGhostFinder = () => {
            const [cities, setCities] = useState([]);
            const [lastUpdate, setLastUpdate] = useState(null);
            const [loading, setLoading] = useState(true);
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [initialPinchDistance, setInitialPinchDistance] = useState(null); 
            const [initialScale, setInitialScale] = useState(1);
            
            const [playerSearch, setPlayerSearch] = useState(''); 
            const [selectedOcean, setSelectedOcean] = useState('all');
            const [hoveredCity, setHoveredCity] = useState(null);
            const [selectedCity, setSelectedCity] = useState(null);
            const [distanceMode, setDistanceMode] = useState(false);
            const [citiesForDistance, setCitiesForDistance] = useState([]);
            const [dataError, setDataError] = useState(null);
            
            const mapRef = useRef(null); 

            const mapBounds = useMemo(() => {
                let targetCities = cities;

                if (selectedOcean !== 'all') {
                    const oX = parseInt(selectedOcean.charAt(0)) * 100;
                    const oY = parseInt(selectedOcean.charAt(1)) * 100;
                    return { minX: oX, maxX: oX + 100, minY: oY, maxY: oY + 100 };
                }

                if (playerSearch.trim() !== '') {
                    targetCities = cities.filter(c => !c.isGhost && c.player_name.toLowerCase().includes(playerSearch.toLowerCase()));
                }
                
                if (targetCities.length === 0) return { minX: 0, maxX: 1000, minY: 0, maxY: 1000 };
                
                const xs = targetCities.map(c => c.x);
                const ys = targetCities.map(c => c.y);
                return { 
                    minX: Math.max(0, Math.min(...xs) - 30), 
                    maxX: Math.min(1000, Math.max(...xs) + 30), 
                    minY: Math.max(0, Math.min(...ys) - 30), 
                    maxY: Math.min(1000, Math.max(...ys) + 30) 
                };
            }, [cities, playerSearch, selectedOcean]);

            const zoomToOccupiedAreas = useCallback((bounds = mapBounds) => {
                if (cities.length === 0 || !mapRef.current) return;
                
                const width = bounds.maxX - bounds.minX;
                const height = bounds.maxY - bounds.minY;
                const mapContainer = mapRef.current.closest('.map-wrapper');
                if (!mapContainer) return;

                const mapWidth = mapContainer.offsetWidth; 
                const mapHeight = mapContainer.offsetHeight;

                const scaleX = mapWidth / width; 
                const scaleY = mapHeight / height; 
                const scale = Math.min(scaleX, scaleY, 12); 

                const centerX = (bounds.minX + bounds.maxX) / 2;
                const centerY = (bounds.minY + bounds.maxY) / 2;
                
                setTransform({
                    x: (mapWidth / 2) - centerX * scale,
                    y: (mapHeight / 2) - centerY * scale,
                    scale: scale
                });
            }, [cities.length, mapBounds]);

            const handleWheel = useCallback((e) => {
                e.preventDefault(); 
                const scaleFactor = e.deltaY > 0 ? 0.9 : 1.1;
                const mapRect = mapRef.current.getBoundingClientRect();
                const mouseX = e.clientX - mapRect.left;
                const mouseY = e.clientY - mapRect.top;
                
                setTransform(prev => {
                    const newScale = Math.max(0.1, Math.min(15, prev.scale * scaleFactor));
                    if (newScale === prev.scale) return prev;
                    return {
                        x: mouseX - (mouseX - prev.x) * scaleFactor,
                        y: mouseY - (mouseY - prev.y) * scaleFactor,
                        scale: newScale
                    };
                });
            }, []);
            
            useEffect(() => {
                const mapElement = mapRef.current;
                if (mapElement) {
                    mapElement.addEventListener('wheel', handleWheel, { passive: false });
                    return () => mapElement.removeEventListener('wheel', handleWheel);
                }
            }, [handleWheel]); 

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const { mergedCities, lastUpdate } = await fetchData();
                        setCities(mergedCities);
                        setLastUpdate(lastUpdate);
                    } catch (err) {
                        setDataError(err.message);
                    } finally { 
                        setLoading(false); 
                    }
                };
                loadData();
            }, []);
            
            useEffect(() => {
                if (!loading && cities.length > 0) {
                    zoomToOccupiedAreas(mapBounds);
                }
            }, [playerSearch, selectedOcean, loading, cities.length]);

            const filteredCities = useMemo(() => {
                return cities.filter(city => selectedOcean === 'all' || city.ocean === selectedOcean);
            }, [cities, selectedOcean]);

            const groupedCities = useMemo(() => {
                const groups = {};
                filteredCities.forEach(city => {
                    const key = `${city.x},${city.y}`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(city);
                });
                return groups;
            }, [filteredCities]);

            const oceans = useMemo(() => {
                const list = [];
                for(let i=0; i<100; i++) {
                    list.push(i.toString().padStart(2, '0'));
                }
                return list;
            }, []);

            const handleMouseDown = useCallback((e) => {
                if (e.button === 2) return;
                setIsDragging(true);
                setDragStart({ x: e.clientX - transform.x, y: e.clientY - transform.y });
            }, [transform]);

            const handleMouseMove = useCallback((e) => {
                if (!isDragging || initialPinchDistance !== null) return;
                setTransform(prev => ({ ...prev, x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }));
            }, [isDragging, dragStart, initialPinchDistance]);

            const handleMouseUp = useCallback(() => { setIsDragging(false); }, []);
            
            const getTouchDistance = (touches) => {
                return Math.sqrt(Math.pow(touches[0].clientX - touches[1].clientX, 2) + Math.pow(touches[0].clientY - touches[1].clientY, 2));
            };

            const handleTouchStart = useCallback((e) => {
                if (e.touches.length === 2) {
                    e.preventDefault(); 
                    setInitialPinchDistance(getTouchDistance(e.touches));
                    setInitialScale(transform.scale);
                    setIsDragging(false);
                } else if (e.touches.length === 1) {
                    setIsDragging(true);
                    setInitialPinchDistance(null);
                    setDragStart({ x: e.touches[0].clientX - transform.x, y: e.touches[0].clientY - transform.y });
                }
            }, [transform]);

            const handleTouchMove = useCallback((e) => {
                if (e.touches.length === 2 && initialPinchDistance !== null) {
                    e.preventDefault();
                    const currentDistance = getTouchDistance(e.touches);
                    const scaleFactor = currentDistance / initialPinchDistance;
                    let newScale = Math.max(0.1, Math.min(15, initialScale * scaleFactor));
                    const touchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const touchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                    setTransform(prev => ({
                        x: touchCenterX - (touchCenterX - prev.x) * (newScale / prev.scale),
                        y: touchCenterY - (touchCenterY - prev.y) * (newScale / prev.scale),
                        scale: newScale
                    }));
                } else if (e.touches.length === 1 && isDragging) {
                    setTransform(prev => ({ ...prev, x: e.touches[0].clientX - dragStart.x, y: e.touches[0].clientY - dragStart.y }));
                }
            }, [isDragging, dragStart, initialPinchDistance, initialScale]);

            const handleCityClick = useCallback((e, cityOrCluster) => {
                if (isDragging) return; 
                if (distanceMode) {
                    const city = Array.isArray(cityOrCluster) ? cityOrCluster[0] : cityOrCluster;
                    setCitiesForDistance(prev => {
                        if (prev.length === 0) return [city];
                        if (prev.length === 1) {
                            if (prev[0].id === city.id) return []; 
                            return [...prev, city];
                        }
                        return [city];
                    });
                } else {
                    setSelectedCity(prev => {
                        let isSame = false;
                        if (prev && cityOrCluster) {
                            if (Array.isArray(prev) && Array.isArray(cityOrCluster)) {
                                isSame = prev[0].x === cityOrCluster[0].x && prev[0].y === cityOrCluster[0].y;
                            } else if (!Array.isArray(prev) && !Array.isArray(cityOrCluster)) {
                                isSame = prev.id === cityOrCluster.id;
                            }
                        }
                        return isSame ? null : cityOrCluster;
                    });
                }
            }, [distanceMode, isDragging]);

            const renderOceanSquares = useCallback(() => {
                const squares = [];
                for (let x = 0; x < 10; x++) {
                    for (let y = 0; y < 10; y++) {
                        const oceanNum = getGrepolisOcean(x * 100 + 1, y * 100 + 1);
                        const isSelected = selectedOcean === oceanNum;
                        const isEven = (x % 2 === 0) === (y % 2 === 0);
                        squares.push(
                            <g key={oceanNum}>
                                <rect 
                                    x={x * 100} y={y * 100} width={100} height={100} 
                                    fill={isSelected ? '#1e293b' : (isEven ? '#1e3a5f' : '#2d4a6f')} 
                                    stroke={isSelected ? '#f59e0b' : '#0f172a'} 
                                    strokeWidth={isSelected ? '2' : '0.5'} 
                                    opacity={selectedOcean === 'all' || isSelected ? 1 : 0.15}
                                />
                                <text 
                                    x={x * 100 + 50} y={y * 100 + 50} textAnchor="middle" dy="0.35em" 
                                    fill={isSelected ? '#f59e0b' : '#64748b'} fontSize="11" fontWeight="bold"
                                    opacity={selectedOcean === 'all' || isSelected ? 0.8 : 0.1}
                                >
                                    {oceanNum}
                                </text>
                            </g>
                        );
                    }
                }
                return squares;
            }, [selectedOcean]);

            const renderDistanceLines = useCallback(() => {
                if (citiesForDistance.length < 2) return null;
                const [city1, city2] = citiesForDistance;
                const dist = calculateDistance(city1.x, city1.y, city2.x, city2.y);
                return (
                    <g>
                        <line x1={city1.x} y1={city1.y} x2={city2.x} y2={city2.y} stroke="#10b981" strokeWidth="1.5" className="distance-line" />
                        <text x={(city1.x + city2.x) / 2} y={(city1.y + city2.y) / 2} textAnchor="middle" dy="-0.5em" fill="#10b981" fontSize={Math.max(4, 13 / transform.scale)} fontWeight="bold" style={{ pointerEvents: 'none', textShadow: '0 0 3px #0f172a' }}>{dist}</text>
                    </g>
                );
            }, [citiesForDistance, transform.scale]);

            const renderCities = useMemo(() => {
                return Object.entries(groupedCities).map(([key, list]) => {
                    const [x, y] = key.split(',').map(Number);
                    
                    const hasTargetPlayer = list.some(c => !c.isGhost && playerSearch.trim() !== '' && c.player_name.toLowerCase().includes(playerSearch.toLowerCase()));
                    const allAreGhosts = list.every(c => c.isGhost);

                    let cityColor = '#475569'; 
                    let radius = Math.max(1.2, 3.8 / transform.scale);
                    let opacity = 0.25;

                    if (hasTargetPlayer) {
                        cityColor = '#22c55e'; 
                        radius = Math.max(1.8, 5.5 / transform.scale); 
                        opacity = 1;
                    } else if (allAreGhosts) {
                        cityColor = '#fef08a'; 
                        opacity = 0.85;
                    }

                    const payload = list.length > 1 ? list : list[0];
                    const isHovered = hoveredCity && ((Array.isArray(hoveredCity) && hoveredCity[0].x === x && hoveredCity[0].y === y) || (!Array.isArray(hoveredCity) && hoveredCity.x === x && hoveredCity.y === y));
                    const isSelected = selectedCity && ((Array.isArray(selected
