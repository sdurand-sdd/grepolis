<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grepolis - Domination (Fusion & Indicateurs)</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // CONFIGURATION
        const MERE_ID = "4629";
        const WING_ID = "15359";
        const FUSION_ID = "999999";
        const NOM_FUSION = "Renaissance + Dragons (Global)";

        const OceanDomination = () => {
            const [loading, setLoading] = useState(false);
            const [alliances, setAlliances] = useState({});
            const [players, setPlayers] = useState({});
            const [towns, setTowns] = useState([]);
            const [selectedAlliance, setSelectedAlliance] = useState('');
            const [filesLoaded, setFilesLoaded] = useState({ alliances: false, players: false, towns: false });
            const [lastUpdate, setLastUpdate] = useState(null);

            const GITHUB_URLS = {
                alliances: 'https://sdurand-sdd.github.io/grepolis/alliances.txt',
                players: 'https://sdurand-sdd.github.io/grepolis/players.txt',
                towns: 'https://sdurand-sdd.github.io/grepolis/towns.txt',
                lastUpdate: 'https://sdurand-sdd.github.io/grepolis/last_update.txt'
            };

            const loadFromGitHub = async () => {
                setLoading(true);
                try {
                    const dateResponse = await fetch(GITHUB_URLS.lastUpdate);
                    if (dateResponse.ok) { const dateText = await dateResponse.text(); setLastUpdate(dateText.trim()); }

                    const [allRes, plRes, twRes] = await Promise.all([
                        fetch(GITHUB_URLS.alliances).then(r => r.text()),
                        fetch(GITHUB_URLS.players).then(r => r.text()),
                        fetch(GITHUB_URLS.towns).then(r => r.text())
                    ]);

                    const alliancesData = {};
                    allRes.split('\n').forEach(line => {
                        if (line.trim()) {
                            const p = line.split(',');
                            alliancesData[p[0]] = { id: p[0], name: decodeURIComponent(p[1].replace(/\+/g, ' ')), points: parseInt(p[2]) || 0 };
                        }
                    });
                    if (alliancesData[MERE_ID] && alliancesData[WING_ID]) {
                        alliancesData[FUSION_ID] = { id: FUSION_ID, name: NOM_FUSION, points: alliancesData[MERE_ID].points + alliancesData[WING_ID].points };
                    }
                    setAlliances(alliancesData);

                    const playersData = {};
                    plRes.split('\n').forEach(line => {
                        if (line.trim()) {
                            const p = line.split(',');
                            playersData[p[0]] = { id: p[0], name: decodeURIComponent(p[1].replace(/\+/g, ' ')), alliance_id: p[2] || null };
                        }
                    });
                    setPlayers(playersData);

                    const townsData = [];
                    twRes.split('\n').forEach(line => {
                        if (line.trim()) {
                            const p = line.split(',');
                            if (p.length >= 7) {
                                const x = parseInt(p[3]), y = parseInt(p[4]);
                                townsData.push({ id: p[0], player_id: p[1], points: parseInt(p[6]) || 0, ocean: Math.floor(x / 100) * 10 + Math.floor(y / 100) });
                            }
                        }
                    });
                    setTowns(townsData);
                    setFilesLoaded({ alliances: true, players: true, towns: true });
                } catch (error) { alert(`Erreur: ${error.message}`); }
                finally { setLoading(false); }
            };

            useEffect(() => { loadFromGitHub(); }, []);

            const oceanStats = (() => {
                const stats = {};
                towns.forEach(town => {
                    const player = players[town.player_id];
                    let aId = player?.alliance_id;
                    if (!aId) return;
                    let effId = (aId === MERE_ID || aId === WING_ID) ? FUSION_ID : aId;
                    if (!stats[town.ocean]) stats[town.ocean] = {};
                    if (!stats[town.ocean][effId]) {
                        stats[town.ocean][effId] = { alliance_id: effId, alliance_name: alliances[effId]?.name || 'Inconnu', towns_count: 0, points: 0 };
                    }
                    stats[town.ocean][effId].towns_count++;
                    stats[town.ocean][effId].points += town.points;
                });
                return stats;
            })();

            const getRanking = (ocean) => Object.values(oceanStats[ocean] || {}).sort((a, b) => b.points - a.points);

            if (!filesLoaded.alliances) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-amber-400">Chargement...</div>;

            return (
                <div className="w-full min-h-screen bg-slate-900 p-8 text-slate-200">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-3xl font-bold text-amber-400">Domination des Océans - Grepolis</h1>
                                <p className="text-slate-400 mt-1">📅 Mise à jour : <span className="text-green-400 font-mono">{lastUpdate}</span></p>
                            </div>
                            <button onClick={loadFromGitHub} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition-all">🔄 Actualiser</button>
                        </div>

                        <div className="bg-slate-800 p-4 rounded-xl mb-8 border border-slate-700">
                            <select value={selectedAlliance} onChange={(e) => setSelectedAlliance(e.target.value)} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 outline-none">
                                <option value="">-- Choisir une alliance --</option>
                                {Object.values(alliances).sort((a, b) => a.name.localeCompare(b.name)).map(a => (
                                    <option key={a.id} value={a.id} className={a.id === FUSION_ID ? "text-amber-400 font-bold" : ""}>{a.name}</option>
                                ))}
                            </select>
                        </div>

                        {selectedAlliance && (
                            <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                                <h2 className="text-xl font-semibold text-center mb-6 text-amber-400">Carte : {alliances[selectedAlliance]?.name}</h2>
                                <div className="grid grid-cols-10 gap-1.5 max-w-4xl mx-auto">
                                    {Array.from({ length: 100 }, (_, i) => {
                                        const ocean = (i % 10) * 10 + Math.floor(i / 10);
                                        const ranking = getRanking(ocean);
                                        const top1 = ranking[0];
                                        const top2 = ranking[1];
                                        const selectedData = ranking.find(r => r.alliance_id === selectedAlliance);
                                        const rank = selectedData ? ranking.indexOf(selectedData) + 1 : null;

                                        let color = "bg-slate-700 opacity-30";
                                        if (rank === 1) color = "bg-green-600";
                                        else if (rank === 2) color = "bg-yellow-600";
                                        else if (rank === 3) color = "bg-orange-600";
                                        else if (rank > 3) color = "bg-red-700";

                                        return (
                                            <div key={ocean} className={`${color} aspect-square rounded-md flex flex-col items-center justify-center relative group cursor-help border border-black/20`}>
                                                <span className="text-[10px] font-bold text-white/90">{ocean.toString().padStart(2, '0')}</span>
                                                {rank && <span className="text-[9px] font-black text-black/40">#{rank}</span>}

                                                <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 hidden group-hover:block z-50 w-72">
                                                    <div className="bg-slate-950 border border-slate-700 p-4 rounded-xl shadow-2xl text-xs space-y-3">
                                                        <div className="flex justify-between border-b border-slate-800 pb-2">
                                                            <span className="text-amber-400 font-bold">Océan {ocean.toString().padStart(2, '0')}</span>
                                                            {rank && <span className="text-slate-400 font-bold">Rang #{rank}</span>}
                                                        </div>
                                                        
                                                        {selectedData ? (
                                                            <div className="space-y-1">
                                                                <div className="font-bold text-white mb-1">{alliances[selectedAlliance]?.name}</div>
                                                                <div className="grid grid-cols-2 text-slate-400 mb-2">
                                                                    <div>🏘️ {selectedData.towns_count} villes</div>
                                                                    <div>📊 {selectedData.points.toLocaleString()} pts</div>
                                                                </div>
                                                              {/* CALCULS AVANCE / RETARD CORRIGÉS */}
                                                <div className="pt-2 border-t border-slate-800 space-y-1">
                                                    {rank === 1 ? (
                                                        <>
                                                            {/* Cas où on est n°1 aux points : on compare au n°2 pour l'avance */}
                                                            <div className="text-green-400 flex justify-between">
                                                                <span>Avance points :</span> <span>+{(selectedData.points - (top2?.points || 0)).toLocaleString()} pts</span>
                                                            </div>
                                                            <div className={`flex justify-between font-bold ${(selectedData.towns_count - (top2?.towns_count || 0)) >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                                <span>{(selectedData.towns_count - (top2?.towns_count || 0)) >= 0 ? 'Avance villes :' : 'Retard villes :'}</span> 
                                                                <span>{(selectedData.towns_count - (top2?.towns_count || 0)) >= 0 ? '+' : ''}{(selectedData.towns_count - (top2?.towns_count || 0))} villes</span>
                                                            </div>
                                                        </>
                                                    ) : (
                                                        <>
                                                            {/* Cas où on n'est pas n°1 aux points : on compare au n°1 (top1) */}
                                                            <div className="text-red-400 flex justify-between">
                                                                <span>Retard points :</span> <span>{(selectedData.points - top1.points).toLocaleString()} pts</span>
                                                            </div>
                                                            <div className={`flex justify-between font-bold ${(selectedData.towns_count - top1.towns_count) >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                                <span>{(selectedData.towns_count - top1.towns_count) >= 0 ? 'Avance villes :' : 'Retard villes :'}</span> 
                                                                <span>{(selectedData.towns_count - top1.towns_count) >= 0 ? '+' : ''}{(selectedData.towns_count - top1.towns_count)} villes</span>
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        ) : <div className="text-slate-500 italic">Aucune présence</div>}

                                        <div className="pt-2 border-t border-slate-800">
                                            <div className="text-[10px] text-slate-500 font-bold mb-1">TOP 3 OCÉAN</div>
                                            {ranking.slice(0, 3).map((a, idx) => (
                                                <div key={a.alliance_id} className={`flex justify-between ${a.alliance_id === selectedAlliance ? 'text-amber-400 font-bold' : 'text-slate-400'}`}>
                                                    <span className="truncate w-32">#{idx+1} {a.alliance_name}</span>
                                                    <span>{a.towns_count} v.</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

        ReactDOM.render(<OceanDomination />, document.getElementById('root'));
    </script>
</body>
</html>
