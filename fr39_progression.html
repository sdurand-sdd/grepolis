<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grepolis - Progression des Joueurs</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sortable-header { cursor: pointer; user-select: none; transition: color 0.15s; }
        .sortable-header:hover { color: #fbbf24; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // =============================================
        // CONFIGURATION — à adapter à ton repo GitHub
        // =============================================
        const GITHUB_BASE = 'https://sdurand-sdd.github.io/grepolis';
        const ARCHIVES_PATH = `${GITHUB_BASE}/archives`; // sous-dossier /archives sur ton repo

        // Génère la liste des semaines disponibles (on essaie de les charger dynamiquement)
        // Format : YYYY_WXX  ex: 2025_W52, 2026_W01
        const getWeekLabel = (year, week) => {
            const w = String(week).padStart(2, '0');
            return `${year}_W${w}`;
        };

        // Retourne l'ISO week number d'une date
        const getISOWeek = (date) => {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return { week: Math.ceil((((d - yearStart) / 86400000) + 1) / 7), year: d.getUTCFullYear() };
        };

        // Génère les semaines des 6 derniers mois
        // Retourne la date du samedi d'une semaine ISO
        const getSaturdayOfWeek = (year, week) => {
            const jan4 = new Date(Date.UTC(year, 0, 4));
            const dayOfWeek = jan4.getUTCDay() || 7;
            const monday = new Date(jan4);
            monday.setUTCDate(jan4.getUTCDate() - (dayOfWeek - 1) + (week - 1) * 7);
            const saturday = new Date(monday);
            saturday.setUTCDate(monday.getUTCDate() + 5);
            return saturday;
        };

        const weekOptionLabel = (w) => {
            const [yearStr, weekPart] = w.split('_W');
            const sat = getSaturdayOfWeek(parseInt(yearStr), parseInt(weekPart));
            const dateStr = sat.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', timeZone: 'UTC' });
            return `${yearStr} — Semaine ${weekPart} — ${dateStr}`;
        };

        const generateRecentWeeks = () => {
            const weeks = [];
            const now = new Date();
            for (let i = 0; i <= 26; i++) {
                const d = new Date(now);
                d.setDate(d.getDate() - i * 7);
                const { week, year } = getISOWeek(d);
                weeks.push(getWeekLabel(year, week));
            }
            return weeks;
        };

        // Parse une ligne CSV Grepolis
        const parseLine = (line) => line.trim() ? line.split(',') : null;

        const decodeGrepName = (str) => {
            try { return decodeURIComponent(str.trim().replace(/\+/g, ' ')); }
            catch { return str.trim(); }
        };

        // Parse alliances.txt → { id: { id, name, points } }
        const parseAlliances = (text) => {
            const data = {};
            text.split('\n').forEach(line => {
                const p = parseLine(line);
                if (p && p.length >= 2) {
                    data[p[0]] = { id: p[0], name: decodeGrepName(p[1]), points: parseInt(p[2]) || 0 };
                }
            });
            return data;
        };

        // Parse players.txt → { id: { id, name, alliance_id, points, towns } }
        const parsePlayers = (text) => {
            const data = {};
            text.split('\n').forEach(line => {
                const p = parseLine(line);
                if (p && p.length >= 2) {
                    data[p[0]] = {
                        id: p[0],
                        name: decodeGrepName(p[1]),
                        alliance_id: p[2]?.trim() || null,
                        points: parseInt(p[3]) || 0,
                    };
                }
            });
            return data;
        };

        // Parse towns.txt → map player_id → count de villes
        const parseTownCounts = (text) => {
            const counts = {};
            text.split('\n').forEach(line => {
                const p = parseLine(line);
                if (p && p.length >= 2) {
                    const pid = p[1]?.trim();
                    if (pid) counts[pid] = (counts[pid] || 0) + 1;
                }
            });
            return counts;
        };

        // Fetch depuis GitHub pages
        const fetchFile = async (url) => {
            const r = await fetch(url + '?t=' + Date.now());
            if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
            return r.text();
        };

        // Charge un snapshot (fichier "actuel" ou archivé)
        const loadSnapshot = async (weekLabel) => {
            let suffix = weekLabel ? `_${weekLabel}` : '';
            const base = weekLabel ? ARCHIVES_PATH : GITHUB_BASE;
            const [alliancesText, playersText, townsText] = await Promise.all([
                fetchFile(`${base}/alliances${suffix}.txt`),
                fetchFile(`${base}/players${suffix}.txt`),
                fetchFile(`${base}/towns${suffix}.txt`),
            ]);
            return {
                alliances: parseAlliances(alliancesText),
                players: parsePlayers(playersText),
                townCounts: parseTownCounts(townsText),
            };
        };

        // =============================================
        // COMPOSANT PRINCIPAL
        // =============================================
        const ProgressionApp = () => {
            const [loading, setLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState('');
            const [error, setError] = useState(null);

            // Snapshots chargés
            const [currentSnap, setCurrentSnap] = useState(null);   // données les plus récentes
            const [refSnap, setRefSnap] = useState(null);            // données de référence (ancienne semaine)

            // Sélections UI
            const [selectedAlliance, setSelectedAlliance] = useState('');
            const [weekRef, setWeekRef] = useState('');      // semaine de référence
            const [weekCurrent, setWeekCurrent] = useState(''); // semaine "actuelle" (vide = fichier racine)

            // Tri tableau
            const [sortCol, setSortCol] = useState('delta');
            const [sortDir, setSortDir] = useState('desc');

            const recentWeeks = useMemo(() => generateRecentWeeks(), []);

            // Chargement initial du snapshot courant (fichier racine)
            useEffect(() => {
                (async () => {
                    setLoading(true);
                    setLoadingMsg('Chargement des données actuelles...');
                    setError(null);
                    try {
                        const snap = await loadSnapshot(null);
                        setCurrentSnap(snap);
                        setLoadingMsg('');
                    } catch (e) {
                        setError(`Impossible de charger les données depuis GitHub.\n${e.message}`);
                    } finally {
                        setLoading(false);
                        setLoadingMsg('');
                    }
                })();
            }, []);

            // Charger snapshot de référence quand weekRef change
            useEffect(() => {
                if (!weekRef) { setRefSnap(null); return; }
                (async () => {
                    setLoading(true);
                    setLoadingMsg(`Chargement de la semaine ${weekRef}...`);
                    setError(null);
                    try {
                        const snap = await loadSnapshot(weekRef);
                        setRefSnap(snap);
                    } catch (e) {
                        setError(`Semaine ${weekRef} non disponible.`);
                        setRefSnap(null);
                    } finally {
                        setLoading(false);
                        setLoadingMsg('');
                    }
                })();
            }, [weekRef]);

            // Charger snapshot "actuel" personnalisé si weekCurrent est choisi
            useEffect(() => {
                if (!weekCurrent) {
                    // revenir au fichier racine
                    (async () => {
                        setLoading(true);
                        setLoadingMsg('Chargement des données actuelles...');
                        try {
                            const snap = await loadSnapshot(null);
                            setCurrentSnap(snap);
                        } catch (e) {
                            setError(e.message);
                        } finally {
                            setLoading(false);
                        }
                    })();
                    return;
                }
                (async () => {
                    setLoading(true);
                    setLoadingMsg(`Chargement de la semaine ${weekCurrent}...`);
                    try {
                        const snap = await loadSnapshot(weekCurrent);
                        setCurrentSnap(snap);
                    } catch (e) {
                        setError(`Semaine ${weekCurrent} non disponible.`);
                    } finally {
                        setLoading(false);
                    }
                })();
            }, [weekCurrent]);

            // Liste alliances triées
            const alliancesList = useMemo(() => {
                if (!currentSnap) return [];
                return Object.values(currentSnap.alliances).sort((a, b) => a.name.localeCompare(b.name));
            }, [currentSnap]);

            // Calcul du tableau de progression
            const tableData = useMemo(() => {
                if (!currentSnap || !selectedAlliance) return [];

                // Joueurs de l'alliance dans le snapshot courant
                const players = Object.values(currentSnap.players).filter(
                    p => p.alliance_id === selectedAlliance
                );

                return players.map(player => {
                    const currentTowns = currentSnap.townCounts[player.id] || 0;
                    const refTowns = refSnap ? (refSnap.townCounts[player.id] || 0) : null;
                    const delta = refTowns !== null ? currentTowns - refTowns : null;

                    // Points actuels
                    const currentPoints = currentSnap.players[player.id]?.points || 0;
                    const refPoints = refSnap ? (refSnap.players[player.id]?.points || 0) : null;
                    const deltaPoints = refPoints !== null ? currentPoints - refPoints : null;

                    // Le joueur était-il dans l'alliance à la période de référence ?
                    const wasInAlliance = refSnap
                        ? refSnap.players[player.id]?.alliance_id === selectedAlliance
                        : null;

                    return {
                        id: player.id,
                        name: player.name,
                        currentTowns,
                        refTowns,
                        delta,
                        currentPoints,
                        refPoints,
                        deltaPoints,
                        wasInAlliance,
                        isNew: refSnap ? !refSnap.players[player.id] : false,
                    };
                });
            }, [currentSnap, refSnap, selectedAlliance]);

            // Tri
            const sortedData = useMemo(() => {
                if (!tableData.length) return [];
                return [...tableData].sort((a, b) => {
                    let va = a[sortCol] ?? -Infinity;
                    let vb = b[sortCol] ?? -Infinity;
                    if (sortCol === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
                    if (sortDir === 'asc') return va < vb ? -1 : va > vb ? 1 : 0;
                    return va > vb ? -1 : va < vb ? 1 : 0;
                });
            }, [tableData, sortCol, sortDir]);

            const handleSort = (col) => {
                if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
                else { setSortCol(col); setSortDir('desc'); }
            };

            const SortIcon = ({ col }) => {
                if (sortCol !== col) return <span className="ml-1 text-slate-600">⇅</span>;
                return <span className="ml-1 text-amber-400">{sortDir === 'asc' ? '↑' : '↓'}</span>;
            };

            const allianceName = currentSnap?.alliances[selectedAlliance]?.name || '';

            const totalCurrentTowns = sortedData.reduce((s, r) => s + r.currentTowns, 0);
            const totalDelta = sortedData.reduce((s, r) => s + (r.delta || 0), 0);

            // ——— RENDU ———
            return (
                <div className="min-h-screen bg-slate-900 text-white">
                    {/* HEADER */}
                    <div className="bg-slate-800 border-b border-slate-700 shadow-xl">
                        <div className="max-w-7xl mx-auto px-4 py-5">
                            <div className="flex items-center gap-3 mb-1">
                                <span className="text-2xl">🏛️</span>
                                <h1 className="text-2xl font-bold text-amber-400 tracking-wide">
                                    Progression des Joueurs — Grepolis
                                </h1>
                                {loading && (
                                    <div className="ml-3 w-5 h-5 border-2 border-amber-400 border-t-transparent rounded-full spin"></div>
                                )}
                            </div>
                            <p className="text-slate-400 text-sm pl-9">
                                Suivi du delta de villes conquises par alliance entre deux semaines
                            </p>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-6">

                        {/* ERREUR */}
                        {error && (
                            <div className="mb-4 bg-red-900/50 border border-red-500 rounded-lg p-4 text-red-300 whitespace-pre-line text-sm">
                                ⚠️ {error}
                            </div>
                        )}

                        {/* BARRE DE CONTROLES */}
                        <div className="bg-slate-800 rounded-xl border border-slate-700 p-5 mb-6 shadow-lg">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

                                {/* Alliance */}
                                <div>
                                    <label className="block text-xs text-slate-400 mb-1 font-semibold uppercase tracking-widest">
                                        Alliance
                                    </label>
                                    <select
                                        value={selectedAlliance}
                                        onChange={e => setSelectedAlliance(e.target.value)}
                                        className="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-400"
                                    >
                                        <option value="">— Choisir une alliance —</option>
                                        {alliancesList.map(a => (
                                            <option key={a.id} value={a.id}>{a.name}</option>
                                        ))}
                                    </select>
                                </div>

                                {/* Semaine de référence (ancienne) */}
                                <div>
                                    <label className="block text-xs text-slate-400 mb-1 font-semibold uppercase tracking-widest">
                                        Semaine de référence (début)
                                    </label>
                                    <select
                                        value={weekRef}
                                        onChange={e => setWeekRef(e.target.value)}
                                        className="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-400"
                                    >
                                        <option value="">— Aucune (pas de delta) —</option>
                                        {recentWeeks.map(w => (
                                            <option key={w} value={w}>{weekOptionLabel(w)}</option>
                                        ))}
                                    </select>
                                </div>

                                {/* Semaine courante */}
                                <div>
                                    <label className="block text-xs text-slate-400 mb-1 font-semibold uppercase tracking-widest">
                                        Semaine actuelle (fin)
                                    </label>
                                    <select
                                        value={weekCurrent}
                                        onChange={e => setWeekCurrent(e.target.value)}
                                        className="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-400"
                                    >
                                        <option value="">Fichier actuel (racine)</option>
                                        {recentWeeks.map(w => (
                                            <option key={w} value={w}>{weekOptionLabel(w)}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            {/* Message chargement */}
                            {loadingMsg && (
                                <p className="mt-3 text-amber-400 text-sm animate-pulse">{loadingMsg}</p>
                            )}
                        </div>

                        {/* RÉSUMÉ */}
                        {selectedAlliance && sortedData.length > 0 && (
                            <div className="flex flex-wrap gap-4 mb-5 fade-in">
                                <div className="bg-slate-800 border border-slate-700 rounded-xl px-5 py-3 flex flex-col items-center min-w-[130px]">
                                    <span className="text-3xl font-bold text-amber-400">{sortedData.length}</span>
                                    <span className="text-xs text-slate-400 mt-1">Joueurs</span>
                                </div>
                                <div className="bg-slate-800 border border-slate-700 rounded-xl px-5 py-3 flex flex-col items-center min-w-[130px]">
                                    <span className="text-3xl font-bold text-blue-400">{totalCurrentTowns.toLocaleString()}</span>
                                    <span className="text-xs text-slate-400 mt-1">Villes totales</span>
                                </div>
                                {refSnap && (
                                    <div className={`border rounded-xl px-5 py-3 flex flex-col items-center min-w-[130px] ${
                                        totalDelta > 0 ? 'bg-green-900/30 border-green-700' :
                                        totalDelta < 0 ? 'bg-red-900/30 border-red-700' :
                                        'bg-slate-800 border-slate-700'
                                    }`}>
                                        <span className={`text-3xl font-bold ${
                                            totalDelta > 0 ? 'text-green-400' :
                                            totalDelta < 0 ? 'text-red-400' : 'text-slate-400'
                                        }`}>
                                            {totalDelta > 0 ? '+' : ''}{totalDelta}
                                        </span>
                                        <span className="text-xs text-slate-400 mt-1">Delta total villes</span>
                                    </div>
                                )}
                                <div className="bg-slate-800 border border-slate-700 rounded-xl px-5 py-3 flex flex-col items-center min-w-[160px] ml-auto">
                                    <span className="text-sm font-semibold text-amber-300">{allianceName}</span>
                                    {weekRef && (
                                        <span className="text-xs text-slate-500 mt-1">
                                            {weekRef.replace('_', ' ').replace('W', 'S')} → {weekCurrent || 'Actuel'}
                                        </span>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TABLEAU */}
                        {selectedAlliance && !loading && sortedData.length > 0 && (
                            <div className="bg-slate-800 rounded-xl border border-slate-700 shadow-lg overflow-hidden fade-in">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className="bg-slate-700/70 border-b border-slate-600">
                                                <th className="px-4 py-3 text-left text-slate-300 font-semibold w-8">#</th>
                                                <th
                                                    className="px-4 py-3 text-left text-slate-300 font-semibold sortable-header"
                                                    onClick={() => handleSort('name')}
                                                >
                                                    Joueur <SortIcon col="name" />
                                                </th>
                                                <th
                                                    className="px-4 py-3 text-center text-slate-300 font-semibold sortable-header"
                                                    onClick={() => handleSort('currentTowns')}
                                                >
                                                    Villes actuelles <SortIcon col="currentTowns" />
                                                </th>
                                                {refSnap && (
                                                    <>
                                                        <th
                                                            className="px-4 py-3 text-center text-slate-300 font-semibold sortable-header"
                                                            onClick={() => handleSort('refTowns')}
                                                        >
                                                            Villes ({weekRef.replace('_',' ').replace('W','S')}) <SortIcon col="refTowns" />
                                                        </th>
                                                        <th
                                                            className="px-4 py-3 text-center text-slate-300 font-semibold sortable-header"
                                                            onClick={() => handleSort('delta')}
                                                        >
                                                            Δ Villes <SortIcon col="delta" />
                                                        </th>
                                                    </>
                                                )}
                                                <th
                                                    className="px-4 py-3 text-center text-slate-300 font-semibold sortable-header"
                                                    onClick={() => handleSort('currentPoints')}
                                                >
                                                    Points <SortIcon col="currentPoints" />
                                                </th>
                                                {refSnap && (
                                                    <th
                                                        className="px-4 py-3 text-center text-slate-300 font-semibold sortable-header"
                                                        onClick={() => handleSort('deltaPoints')}
                                                    >
                                                        Δ Points <SortIcon col="deltaPoints" />
                                                    </th>
                                                )}
                                                {refSnap && (
                                                    <th className="px-4 py-3 text-center text-slate-300 font-semibold w-20">
                                                        Statut
                                                    </th>
                                                )}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sortedData.map((row, idx) => {
                                                const deltaPositive = row.delta !== null && row.delta > 0;
                                                const deltaNegative = row.delta !== null && row.delta < 0;
                                                const rowBg = idx % 2 === 0 ? 'bg-slate-800' : 'bg-slate-800/50';

                                                return (
                                                    <tr key={row.id} className={`${rowBg} border-b border-slate-700/50 hover:bg-slate-700/40 transition-colors`}>
                                                        <td className="px-4 py-3 text-slate-500 text-xs">{idx + 1}</td>
                                                        <td className="px-4 py-3 font-medium text-white">
                                                            {row.name}
                                                            {row.isNew && (
                                                                <span className="ml-2 text-xs bg-blue-600 text-white px-1.5 py-0.5 rounded font-normal">Nouveau</span>
                                                            )}
                                                        </td>
                                                        <td className="px-4 py-3 text-center text-blue-300 font-bold text-base">
                                                            {row.currentTowns}
                                                        </td>
                                                        {refSnap && (
                                                            <>
                                                                <td className="px-4 py-3 text-center text-slate-400">
                                                                    {row.refTowns !== null ? row.refTowns : <span className="text-slate-600">—</span>}
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    {row.delta !== null ? (
                                                                        <span className={`inline-flex items-center justify-center gap-0.5 font-bold text-base px-2 py-0.5 rounded ${
                                                                            deltaPositive ? 'text-green-400 bg-green-900/30' :
                                                                            deltaNegative ? 'text-red-400 bg-red-900/30' :
                                                                            'text-slate-400'
                                                                        }`}>
                                                                            {deltaPositive && '+'}{row.delta}
                                                                        </span>
                                                                    ) : <span className="text-slate-600">—</span>}
                                                                </td>
                                                            </>
                                                        )}
                                                        <td className="px-4 py-3 text-center text-slate-300">
                                                            {row.currentPoints.toLocaleString()}
                                                        </td>
                                                        {refSnap && (
                                                            <td className="px-4 py-3 text-center">
                                                                {row.deltaPoints !== null ? (
                                                                    <span className={`font-semibold ${
                                                                        row.deltaPoints > 0 ? 'text-green-400' :
                                                                        row.deltaPoints < 0 ? 'text-red-400' :
                                                                        'text-slate-400'
                                                                    }`}>
                                                                        {row.deltaPoints > 0 ? '+' : ''}{row.deltaPoints.toLocaleString()}
                                                                    </span>
                                                                ) : <span className="text-slate-600">—</span>}
                                                            </td>
                                                        )}
                                                        {refSnap && (
                                                            <td className="px-4 py-3 text-center">
                                                                {row.isNew ? (
                                                                    <span title="Joueur non présent dans le snapshot de référence" className="text-blue-400 text-xs">🆕</span>
                                                                ) : row.wasInAlliance === false ? (
                                                                    <span title="Joueur qui a rejoint l'alliance depuis" className="text-amber-400 text-xs">🔄</span>
                                                                ) : (
                                                                    <span className="text-green-400 text-xs">✓</span>
                                                                )}
                                                            </td>
                                                        )}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                        {/* TOTAL */}
                                        {refSnap && (
                                            <tfoot>
                                                <tr className="bg-slate-700 border-t-2 border-amber-600/40 font-bold">
                                                    <td className="px-4 py-3 text-slate-400" colSpan={2}>
                                                        TOTAL ({sortedData.length} joueurs)
                                                    </td>
                                                    <td className="px-4 py-3 text-center text-blue-300 text-base">
                                                        {totalCurrentTowns.toLocaleString()}
                                                    </td>
                                                    <td className="px-4 py-3 text-center text-slate-400">
                                                        {sortedData.reduce((s, r) => s + (r.refTowns || 0), 0).toLocaleString()}
                                                    </td>
                                                    <td className="px-4 py-3 text-center">
                                                        <span className={`font-bold text-base ${
                                                            totalDelta > 0 ? 'text-green-400' :
                                                            totalDelta < 0 ? 'text-red-400' : 'text-slate-400'
                                                        }`}>
                                                            {totalDelta > 0 ? '+' : ''}{totalDelta}
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-3 text-center text-slate-300">
                                                        {sortedData.reduce((s, r) => s + r.currentPoints, 0).toLocaleString()}
                                                    </td>
                                                    <td className="px-4 py-3 text-center">
                                                        <span className={`font-bold ${
                                                            sortedData.reduce((s, r) => s + (r.deltaPoints || 0), 0) > 0 ? 'text-green-400' : 'text-red-400'
                                                        }`}>
                                                            {(() => {
                                                                const t = sortedData.reduce((s, r) => s + (r.deltaPoints || 0), 0);
                                                                return (t > 0 ? '+' : '') + t.toLocaleString();
                                                            })()}
                                                        </span>
                                                    </td>
                                                    <td></td>
                                                </tr>
                                            </tfoot>
                                        )}
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* LÉGENDE */}
                        {refSnap && selectedAlliance && (
                            <div className="mt-4 flex flex-wrap gap-4 text-xs text-slate-500">
                                <span>✓ Dans l'alliance sur les deux périodes</span>
                                <span>🔄 A rejoint l'alliance après la période de référence</span>
                                <span>🆕 Nouveau joueur (absent de la référence)</span>
                            </div>
                        )}

                        {/* État vide */}
                        {!selectedAlliance && currentSnap && !loading && (
                            <div className="text-center text-slate-500 mt-16 text-lg">
                                Sélectionne une alliance pour voir la progression de ses joueurs
                            </div>
                        )}

                        {!currentSnap && !loading && !error && (
                            <div className="text-center text-slate-500 mt-16">
                                En attente des données…
                            </div>
                        )}
                    </div>

                    {/* FOOTER */}
                    <div className="text-center text-slate-700 text-xs py-6 mt-4">
                        Données issues de Grepolis — Hébergé sur GitHub Pages
                    </div>
                </div>
            );
        };

        ReactDOM.render(<ProgressionApp />, document.getElementById('root'));
    </script>
</body>
</html>
