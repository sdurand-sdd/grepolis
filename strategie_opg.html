<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratégie OP - Grepolis</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; }
        .map-container { cursor: grab; touch-action: none; }
        .map-container:active { cursor: grabbing; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const getGrepolisOcean = (x, y) => `${Math.floor(x / 100)}${Math.floor(y / 100)}`;
        const decodeName = (str) => {
            if (!str) return str;
            try { return decodeURIComponent(str.trim().replace(/\+/g, ' ')); }
            catch (e) { return str.trim().replace(/\+/g, ' '); }
        };

        const parseData = (text, headers) => {
            const lines = text.trim().split('\n').filter(line => line.trim() !== '' && !line.startsWith('#'));
            return lines.map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, i) => {
                    const val = values[i];
                    const isNum = ['id', 'x', 'y', 'points', 'towns', 'members', 'player_id', 'alliance_id', 'island_pos'].includes(header);
                    obj[header] = isNum ? (Number(val) || 0) : decodeName(val);
                });
                return obj;
            });
        };

        const GrepolisMap = () => {
            const [data, setData] = useState({ cities: [], alliances: [], lastUpdate: '' });
            const [loading, setLoading] = useState(true);
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 0.8 });
            
            // Champ 1: Cible (Joueur ou Alliance)
            const [targetSearch, setTargetSearch] = useState('');
            // Champ 2: Attaquant (Alliance en liste déroulante)
            const [attackerAlliance, setAttackerAlliance] = useState('');
            
            const [selectedOcean, setSelectedOcean] = useState('all');
            const [selectedCluster, setSelectedCluster] = useState(null);
            const mapRef = useRef(null);

            useEffect(() => {
                Promise.all([
                    fetch('alliances.txt').then(r => r.text()),
                    fetch('players.txt').then(r => r.text()),
                    fetch('towns.txt').then(r => r.text()),
                    fetch('last_update.txt').then(r => r.text()).catch(() => 'Date inconnue')
                ]).then(([allTxt, plaTxt, twnTxt, upTxt]) => {
                    const alliances = parseData(allTxt, ['id', 'name', 'points', 'towns', 'members']).sort((a, b) => a.name.localeCompare(b.name));
                    const players = parseData(plaTxt, ['id', 'name', 'alliance_id', 'points', 'rank', 'towns']);
                    const towns = parseData(twnTxt, ['id', 'player_id', 'name', 'x', 'y', 'island_pos', 'points']);
                    
                    const allianceMap = new Map(alliances.map(a => [a.id, a]));
                    const playerMap = new Map(players.map(p => [p.id, {
                        ...p,
                        alliance_name: allianceMap.get(p.alliance_id)?.name || 'Sans alliance'
                    }]));

                    const merged = towns.map(t => {
                        const p = playerMap.get(t.player_id);
                        if (!p) return null;
                        return { ...t, ocean: getGrepolisOcean(t.x, t.y), player_name: p.name, alliance_name: p.alliance_name, alliance_id: p.alliance_id };
                    }).filter(Boolean);

                    setData({ cities: merged, alliances, lastUpdate: upTxt });
                    setLoading(false);
                });
            }, []);

            const allianceColors = useMemo(() => {
                const colors = {};
                data.alliances.forEach(a => { colors[a.id] = `hsl(${(a.id * 137) % 360}, 70%, 50%)`; });
                colors[0] = '#94a3b8';
                return colors;
            }, [data.alliances]);

            const filteredGroupedCities = useMemo(() => {
                const targets = targetSearch.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);
                const attacker = attackerAlliance.toLowerCase();

                const filtered = data.cities.filter(c => {
                    const matchOcean = selectedOcean === 'all' || c.ocean === selectedOcean;
                    if (!matchOcean) return false;

                    const isTargetMatch = targets.length > 0 && (
                        targets.some(t => c.player_name.toLowerCase().includes(t)) || 
                        targets.some(t => c.alliance_name.toLowerCase().includes(t))
                    );
                    const isAttackerMatch = attacker !== '' && c.alliance_name.toLowerCase() === attacker;

                    if (targets.length === 0 && attacker === '') return true;
                    return isTargetMatch || isAttackerMatch;
                });

                const groups = {};
                filtered.forEach(c => {
                    const key = `${c.x},${c.y}`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(c);
                });
                return Object.values(groups);
            }, [data.cities, targetSearch, attackerAlliance, selectedOcean]);

            const clusterByPlayer = useMemo(() => {
                if (!selectedCluster) return {};
                return selectedCluster.reduce((acc, city) => {
                    if (!acc[city.player_name]) acc[city.player_name] = [];
                    acc[city.player_name].push(city);
                    return acc;
                }, {});
            }, [selectedCluster]);

            if (loading) return <div className="h-screen bg-slate-900 flex items-center justify-center text-white">Initialisation de la carte stratégique...</div>;

            return (
                <div className="h-screen flex flex-col bg-slate-950 text-slate-200">
                    {/* Header avec menu déroulant */}
                    <div className="bg-slate-900 p-3 border-b border-slate-800 flex flex-wrap gap-3 items-center shadow-2xl z-20">
                        <div className="flex flex-col">
                            <span className="text-[10px] text-amber-500 font-bold uppercase ml-1">Cibles (Joueurs/Alliances)</span>
                            <input 
                                placeholder="ex: Jean, Paul, Ennemis..." 
                                className="bg-slate-800 border border-slate-700 px-3 py-1.5 rounded w-64 text-sm focus:ring-1 focus:ring-amber-500 outline-none" 
                                value={targetSearch} onChange={e => setTargetSearch(e.target.value)} 
                            />
                        </div>

                        <div className="flex flex-col">
                            <span className="text-[10px] text-slate-400 font-bold uppercase ml-1">Attaquants (Désactivé sur carte)</span>
                            <select 
                                className="bg-slate-800 border border-slate-700 px-3 py-1.5 rounded w-64 text-sm focus:ring-1 focus:ring-slate-500 outline-none"
                                value={attackerAlliance}
                                onChange={e => setAttackerAlliance(e.target.value)}
                            >
                                <option value="">-- Choisir Alliance Attaquante --</option>
                                {data.alliances.map(all => (
                                    <option key={all.id} value={all.name.toLowerCase()}>{all.name}</option>
                                ))}
                            </select>
                        </div>

                        <div className="flex flex-col">
                            <span className="text-[10px] text-slate-400 font-bold uppercase ml-1">Océan</span>
                            <select className="bg-slate-800 border border-slate-700 px-3 py-1.5 rounded text-sm" value={selectedOcean} onChange={e => setSelectedOcean(e.target.value)}>
                                <option value="all">Tous</option>
                                {[...Array(100).keys()].map(i => <option key={i} value={i.toString().padStart(2, '0')}>{i.toString().padStart(2, '0')}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="flex-1 flex overflow-hidden">
                        <div className="flex-1 relative bg-slate-950 overflow-hidden">
                            <svg ref={mapRef} className="w-full h-full map-container"
                                onMouseDown={(e) => {
                                    if(e.button !== 0) return;
                                    const sX = e.clientX - transform.x, sY = e.clientY - transform.y;
                                    const move = (m) => setTransform(t => ({...t, x: m.clientX - sX, y: m.clientY - sY}));
                                    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
                                    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
                                }}
                                onWheel={(e) => setTransform(t => ({...t, scale: Math.max(0.1, Math.min(20, t.scale * (e.deltaY > 0 ? 0.9 : 1.1)))}))}
                            >
                                <g style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})` }}>
                                    {/* Grille simplifiée */}
                                    {[...Array(11).keys()].map(i => (
                                        <React.Fragment key={i}>
                                            <line x1={i*100} y1="0" x2={i*100} y2="1000" stroke="#1e293b" strokeWidth="0.5" />
                                            <line x1="0" y1={i*100} x2="1000" y2={i*100} stroke="#1e293b" strokeWidth="0.5" />
                                        </React.Fragment>
                                    ))}

                                    {filteredGroupedCities.map((group, idx) => {
                                        const city0 = group[0];
                                        const targets = targetSearch.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);
                                        
                                        // On vérifie si le cluster contient au moins une ville cible
                                        const hasTarget = targets.length > 0 && group.some(c => 
                                            targets.some(t => c.player_name.toLowerCase().includes(t)) || 
                                            targets.some(t => c.alliance_name.toLowerCase().includes(t))
                                        );

                                        // Si c'est une cible : Couleur. Si c'est l'attaquant : Invisible/Fantôme
                                        const circleColor = hasTarget ? (allianceColors[city0.alliance_id] || '#64748b') : 'rgba(71, 85, 105, 0.15)';
                                        const strokeColor = hasTarget ? "white" : "rgba(255, 255, 255, 0.05)";

                                        return (
                                            <g key={idx} onClick={() => setSelectedCluster(group)} className="cursor-pointer">
                                                <circle cx={city0.x} cy={city0.y} r={4/Math.sqrt(transform.scale)} fill={circleColor} stroke={selectedCluster?.[0].x === city0.x ? "#fbbf24" : strokeColor} strokeWidth={hasTarget ? 1/transform.scale : 0.2/transform.scale} />
                                                {group.length > 1 && (
                                                    <text x={city0.x} y={city0.y} textAnchor="middle" dy="0.3em" fill={hasTarget ? "white" : "rgba(255,255,255,0.2)"} fontSize={12/transform.scale} fontWeight="bold" style={{paintOrder: 'stroke', stroke: '#000', strokeWidth: 1.5/transform.scale}}>
                                                        {group.length}
                                                    </text>
                                                )}
                                            </g>
                                        );
                                    })}
                                </g>
                            </svg>
                        </div>

                        {/* Sidebar */}
                        <div className="w-80 bg-[#1e293b] border-l border-slate-800 flex flex-col shadow-2xl">
                            <div className="p-4 overflow-y-auto custom-scrollbar flex-1 space-y-4">
                                {selectedCluster ? (
                                    <>
                                        <div className="bg-[#2d3748] p-3 rounded-lg">
                                            <h3 className="text-white font-bold text-xs uppercase mb-1">Position {selectedCluster[0].x}|{selectedCluster[0].y}</h3>
                                            <p className="text-amber-400 font-bold text-2xl">{selectedCluster.length} Villes</p>
                                        </div>
                                        <div className="bg-[#2d3748] p-3 rounded-lg space-y-4 overflow-y-auto max-h-[70vh] custom-scrollbar">
                                            {Object.entries(clusterByPlayer).map(([playerName, playerCities]) => (
                                                <div key={playerName} className="border-b border-slate-600 pb-2 last:border-0">
                                                    <div className="text-amber-400 font-bold text-sm">{playerName}</div>
                                                    {playerCities.map(city => (
                                                        <div key={city.id} className="text-[11px] mt-1">
                                                            <div className="text-slate-100 truncate">{city.name} ({city.points} pts)</div>
                                                            <div className="text-slate-400 text-[10px]">[{city.alliance_name}] - Pos {city.island_pos}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center py-20 text-slate-500 text-sm">Cliquez sur une île pour voir l'occupation.</div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<GrepolisMap />, document.getElementById('root'));
    </script>
</body>
</html>
