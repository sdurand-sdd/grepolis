<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratégie OP - Grepolis</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        .map-container { cursor: grab; touch-action: none; }
        .map-container:active { cursor: grabbing; }
        .distance-line { stroke-dasharray: 5,5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
        .map-wrapper { height: 100%; min-height: 40vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useEffect, useRef } = React;

        // --- Fonctions Utilitaires ---
        const calculateDistance = (x1, y1, x2, y2) => Math.sqrt(Math.pow(x1 - x2, 2) + Math.pow(y1 - y2, 2)).toFixed(2);
        const getGrepolisOcean = (x, y) => `${Math.floor(x / 100)}${Math.floor(y / 100)}`;
        const decodeName = (str) => {
            if (!str) return str;
            try { return decodeURIComponent(str.trim().replace(/\+/g, ' ')); }
            catch (e) { return str.trim().replace(/\+/g, ' '); }
        };

        const parseData = (text, headers) => {
            const lines = text.trim().split('\n').filter(line => line.trim() !== '' && !line.startsWith('#'));
            return lines.map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, i) => {
                    const val = values[i];
                    const isNum = ['id', 'x', 'y', 'points', 'towns', 'members', 'player_id', 'alliance_id'].includes(header);
                    obj[header] = isNum ? (Number(val) || 0) : decodeName(val);
                });
                return obj;
            });
        };

        const GrepolisMap = () => {
            const [data, setData] = useState({ cities: [], alliances: [], lastUpdate: '' });
            const [loading, setLoading] = useState(true);
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 0.8 });
            const [playerSearch, setPlayerSearch] = useState('');
            const [allianceSearch, setAllianceSearch] = useState('');
            const [selectedOcean, setSelectedOcean] = useState('all');
            const [selectedCity, setSelectedCity] = useState(null);
            const [citiesForDistance, setCitiesForDistance] = useState([]);
            const [distanceMode, setDistanceMode] = useState(false);

            const mapRef = useRef(null);

            // Chargement des données
            useEffect(() => {
                Promise.all([
                    fetch('alliances.txt').then(r => r.text()),
                    fetch('players.txt').then(r => r.text()),
                    fetch('towns.txt').then(r => r.text()),
                    fetch('last_update.txt').then(r => r.text()).catch(() => 'Date inconnue')
                ]).then(([allTxt, plaTxt, twnTxt, upTxt]) => {
                    const alliances = parseData(allTxt, ['id', 'name', 'points', 'towns', 'members']);
                    const players = parseData(plaTxt, ['id', 'name', 'alliance_id', 'points', 'rank', 'towns']);
                    const towns = parseData(twnTxt, ['id', 'player_id', 'name', 'x', 'y', 'island_pos', 'points']);
                    
                    const allianceMap = new Map(alliances.map(a => [a.id, a]));
                    const playerMap = new Map(players.map(p => [p.id, {
                        ...p,
                        alliance_name: allianceMap.get(p.alliance_id)?.name || 'Sans alliance'
                    }]));

                    const merged = towns.map(t => {
                        const p = playerMap.get(t.player_id);
                        if (!p) return null;
                        return { ...t, ocean: getGrepolisOcean(t.x, t.y), player_name: p.name, alliance_name: p.alliance_name, alliance_id: p.alliance_id };
                    }).filter(Boolean);

                    setData({ cities: merged, alliances, lastUpdate: upTxt });
                    setLoading(false);
                });
            }, []);

            const allianceColors = useMemo(() => {
                const colors = {};
                data.alliances.forEach(a => { colors[a.id] = `hsl(${(a.id * 137) % 360}, 70%, 50%)`; });
                return colors;
            }, [data.alliances]);

            // FILTRAGE STRATÉGIQUE (Multi-noms séparés par virgules)
            const filteredCities = useMemo(() => {
                const pTargets = playerSearch.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);
                const aTargets = allianceSearch.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);

                return data.cities.filter(c => {
                    const matchOcean = selectedOcean === 'all' || c.ocean === selectedOcean;
                    if (!matchOcean) return false;

                    const matchP = pTargets.length > 0 ? pTargets.some(t => c.player_name.toLowerCase().includes(t)) : false;
                    const matchA = aTargets.length > 0 ? aTargets.some(t => c.alliance_name.toLowerCase().includes(t)) : false;

                    if (pTargets.length === 0 && aTargets.length === 0) return true;
                    return matchP || matchA;
                });
            }, [data.cities, playerSearch, allianceSearch, selectedOcean]);

            // --- Rendu des composants de la carte ---
            const renderGrid = () => {
                const lines = [];
                for (let i = 0; i <= 1000; i += 100) {
                    lines.push(<line key={`h${i}`} x1="0" y1={i} x2="1000" y2={i} stroke="#334155" strokeWidth="1" />);
                    lines.push(<line key={`v${i}`} x1={i} y1="0" x2={i} y2="1000" stroke="#334155" strokeWidth="1" />);
                }
                const numbers = [];
                for (let x = 0; x < 10; x++) {
                    for (let y = 0; y < 10; y++) {
                        numbers.push(
                            <text key={`${x}${y}`} x={x * 100 + 5} y={y * 100 + 20} fill="#475569" fontSize="12" fontWeight="bold" pointerEvents="none">
                                {x}{y}
                            </text>
                        );
                    }
                }
                return <g>{lines}{numbers}</g>;
            };

            // Zoom intelligent
            const zoomToFit = () => {
                if (filteredCities.length === 0) return;
                const xs = filteredCities.map(c => c.x);
                const ys = filteredCities.map(c => c.y);
                const minX = Math.min(...xs), maxX = Math.max(...xs);
                const minY = Math.min(...ys), maxY = Math.max(...ys);
                const scale = Math.min(800 / (maxX - minX + 50), 800 / (maxY - minY + 50), 10);
                setTransform({ x: 500 - ((minX + maxX) / 2) * scale, y: 500 - ((minY + maxY) / 2) * scale, scale });
            };

            if (loading) return <div className="h-screen bg-slate-900 flex items-center justify-center text-white text-2xl">Chargement de la carte...</div>;

            return (
                <div className="h-screen bg-slate-900 flex flex-col font-sans">
                    {/* Header */}
                    <div className="bg-slate-800 p-3 border-b border-slate-700 shadow-xl z-20">
                        <div className="flex flex-wrap gap-3 items-center">
                            <h2 className="text-amber-400 font-bold mr-4 text-lg">⚔️ STRATÉGIE OP</h2>
                            <input 
                                placeholder="👤 Joueurs (ex: J1, J2...)" 
                                className="bg-slate-700 text-white px-3 py-1.5 rounded border border-slate-600 w-full sm:w-64"
                                value={playerSearch} onChange={e => setPlayerSearch(e.target.value)}
                            />
                            <input 
                                placeholder="🛡️ Alliances (ex: A1, A2...)" 
                                className="bg-slate-700 text-white px-3 py-1.5 rounded border border-slate-600 w-full sm:w-64"
                                value={allianceSearch} onChange={e => setAllianceSearch(e.target.value)}
                            />
                            <select 
                                className="bg-slate-700 text-white px-3 py-1.5 rounded"
                                value={selectedOcean} onChange={e => setSelectedOcean(e.target.value)}
                            >
                                <option value="all">Tous Océans</option>
                                {[...Array(100).keys()].map(i => {
                                    const val = i.toString().padStart(2, '0');
                                    return <option key={val} value={val}>Mer {val}</option>
                                })}
                            </select>
                            <button onClick={zoomToFit} className="bg-amber-600 hover:bg-amber-500 text-white px-4 py-1.5 rounded font-bold transition">CENTRER OP</button>
                            <button 
                                onClick={() => {setDistanceMode(!distanceMode); setCitiesForDistance([]);}} 
                                className={`${distanceMode ? 'bg-green-600' : 'bg-slate-600'} text-white px-4 py-1.5 rounded font-bold`}
                            >📏 DISTANCE</button>
                        </div>
                    </div>

                    <div className="flex-1 flex overflow-hidden flex-col md:flex-row">
                        {/* Map Area */}
                        <div className="flex-1 relative bg-slate-950 cursor-crosshair overflow-hidden">
                            <svg 
                                ref={mapRef}
                                className="w-full h-full map-container"
                                onMouseDown={(e) => {
                                    if (e.button === 0) {
                                        const startX = e.clientX - transform.x;
                                        const startY = e.clientY - transform.y;
                                        const onMouseMove = (moveEvent) => {
                                            setTransform(t => ({ ...t, x: moveEvent.clientX - startX, y: moveEvent.clientY - startY }));
                                        };
                                        const onMouseUp = () => {
                                            window.removeEventListener('mousemove', onMouseMove);
                                            window.removeEventListener('mouseup', onMouseUp);
                                        };
                                        window.addEventListener('mousemove', onMouseMove);
                                        window.addEventListener('mouseup', onMouseUp);
                                    }
                                }}
                                onWheel={(e) => {
                                    const delta = e.deltaY > 0 ? 0.9 : 1.1;
                                    setTransform(t => ({ ...t, scale: Math.max(0.1, Math.min(20, t.scale * delta)) }));
                                }}
                            >
                                <g style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})` }}>
                                    {renderGrid()}
                                    
                                    {/* Rendu des villes individuelles */}
                                    {filteredCities.map(city => (
                                        <circle 
                                            key={city.id}
                                            cx={city.x} cy={city.y} 
                                            r={3.5 / Math.sqrt(transform.scale)}
                                            fill={allianceColors[city.alliance_id] || '#94a3b8'}
                                            stroke={selectedCity?.id === city.id ? "white" : "black"}
                                            strokeWidth={0.5 / transform.scale}
                                            className="hover:brightness-150 transition-all cursor-pointer"
                                            onClick={() => {
                                                if (distanceMode) {
                                                    setCitiesForDistance(prev => prev.length >= 2 ? [city] : [...prev, city]);
                                                } else {
                                                    setSelectedCity(city);
                                                }
                                            }}
                                        />
                                    ))}

                                    {citiesForDistance.length === 2 && (
                                        <line 
                                            x1={citiesForDistance[0].x} y1={citiesForDistance[0].y} 
                                            x2={citiesForDistance[1].x} y2={citiesForDistance[1].y} 
                                            stroke="#10b981" strokeWidth={2/transform.scale} className="distance-line"
                                        />
                                    )}
                                </g>
                            </svg>
                        </div>

                        {/* Sidebar Info */}
                        <div className="w-full md:w-80 bg-slate-800 border-l border-slate-700 p-4 text-slate-200 overflow-y-auto">
                            <h3 className="text-xl font-bold text-amber-400 mb-4 border-b border-slate-600 pb-2">Informations</h3>
                            
                            {selectedCity ? (
                                <div className="space-y-3">
                                    <div className="bg-slate-700 p-3 rounded">
                                        <p className="text-xs text-slate-400 uppercase">Ville</p>
                                        <p className="font-bold text-white text-lg">{selectedCity.name}</p>
                                        <p className="text-sm">Coordonnées: {selectedCity.x} | {selectedCity.y}</p>
                                    </div>
                                    <div className="bg-slate-700 p-3 rounded">
                                        <p className="text-xs text-slate-400 uppercase">Propriétaire</p>
                                        <p className="font-bold text-amber-300 text-lg">{selectedCity.player_name}</p>
                                        <p className="text-sm font-semibold" style={{color: allianceColors[selectedCity.alliance_id]}}>
                                            Alliance : {selectedCity.alliance_name}
                                        </p>
                                    </div>
                                    <div className="bg-slate-700 p-3 rounded">
                                        <p className="text-xs text-slate-400 uppercase">Points</p>
                                        <p className="font-bold text-white">{selectedCity.points.toLocaleString()}</p>
                                    </div>
                                    <button onClick={() => setSelectedCity(null)} className="w-full py-2 bg-slate-600 rounded mt-4">Fermer</button>
                                </div>
                            ) : distanceMode ? (
                                <div className="bg-green-900/30 border border-green-500 p-3 rounded text-green-400">
                                    <p className="font-bold uppercase text-xs">Outil de mesure</p>
                                    {citiesForDistance.length === 2 ? (
                                        <div>
                                            <p className="text-3xl font-black my-2">{calculateDistance(citiesForDistance[0].x, citiesForDistance[0].y, citiesForDistance[1].x, citiesForDistance[1].y)}</p>
                                            <p className="text-xs italic">Distance brute (vitesse 1)</p>
                                        </div>
                                    ) : (
                                        <p className="text-sm mt-2 animate-pulse">Sélectionnez deux villes sur la carte...</p>
                                    )}
                                </div>
                            ) : (
                                <div className="text-slate-400 text-sm space-y-4">
                                    <p>💡 **Astuce OP :**</p>
                                    <p>Pour cibler plusieurs joueurs, séparez les noms par des virgules dans la recherche.</p>
                                    <p>Exemple : `Jean, Pierre, Jacques`</p>
                                    <p className="text-xs mt-10">Dernière mise à jour : {data.lastUpdate}</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<GrepolisMap />, document.getElementById('root'));
    </script>
</body>
</html>
