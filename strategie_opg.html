<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Grepolis - Stratégie OP</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; }
        .map-container { cursor: grab; touch-action: none; }
        .map-container:active { cursor: grabbing; }
        .distance-line { stroke-dasharray: 5,5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useEffect, useRef } = React;

        // --- Fonctions Utilitaires ---
        const calculateDistance = (x1, y1, x2, y2) => Math.sqrt(Math.pow(x1 - x2, 2) + Math.pow(y1 - y2, 2)).toFixed(2);
        const getGrepolisOcean = (x, y) => `${Math.floor(x / 100)}${Math.floor(y / 100)}`;
        const decodeName = (str) => {
            if (!str) return str;
            try { return decodeURIComponent(str.trim().replace(/\+/g, ' ')); }
            catch (e) { return str.trim().replace(/\+/g, ' '); }
        };

        const parseData = (text, headers) => {
            const lines = text.trim().split('\n').filter(line => line.trim() !== '' && !line.startsWith('#'));
            return lines.map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, i) => {
                    const val = values[i];
                    const isNum = ['id', 'x', 'y', 'points', 'towns', 'members', 'player_id', 'alliance_id', 'island_pos'].includes(header);
                    obj[header] = isNum ? (Number(val) || 0) : decodeName(val);
                });
                return obj;
            });
        };

        const GrepolisMap = () => {
            const [data, setData] = useState({ cities: [], alliances: [], lastUpdate: '' });
            const [loading, setLoading] = useState(true);
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 0.8 });
            const [playerSearch, setPlayerSearch] = useState('');
            const [allianceSearch, setAllianceSearch] = useState('');
            const [selectedOcean, setSelectedOcean] = useState('all');
            const [selectedCluster, setSelectedCluster] = useState(null);
            const [citiesForDistance, setCitiesForDistance] = useState([]);
            const [distanceMode, setDistanceMode] = useState(false);

            const mapRef = useRef(null);

            useEffect(() => {
                Promise.all([
                    fetch('alliances.txt').then(r => r.text()),
                    fetch('players.txt').then(r => r.text()),
                    fetch('towns.txt').then(r => r.text()),
                    fetch('last_update.txt').then(r => r.text()).catch(() => 'Date inconnue')
                ]).then(([allTxt, plaTxt, twnTxt, upTxt]) => {
                    const alliances = parseData(allTxt, ['id', 'name', 'points', 'towns', 'members']);
                    const players = parseData(plaTxt, ['id', 'name', 'alliance_id', 'points', 'rank', 'towns']);
                    const towns = parseData(twnTxt, ['id', 'player_id', 'name', 'x', 'y', 'island_pos', 'points']);
                    
                    const allianceMap = new Map(alliances.map(a => [a.id, a]));
                    const playerMap = new Map(players.map(p => [p.id, {
                        ...p,
                        alliance_name: allianceMap.get(p.alliance_id)?.name || 'Sans alliance'
                    }]));

                    const merged = towns.map(t => {
                        const p = playerMap.get(t.player_id);
                        if (!p) return null;
                        return { ...t, ocean: getGrepolisOcean(t.x, t.y), player_name: p.name, alliance_name: p.alliance_name, alliance_id: p.alliance_id };
                    }).filter(Boolean);

                    setData({ cities: merged, alliances, lastUpdate: upTxt });
                    setLoading(false);
                });
            }, []);

            const allianceColors = useMemo(() => {
                const colors = {};
                data.alliances.forEach(a => { colors[a.id] = `hsl(${(a.id * 137) % 360}, 70%, 50%)`; });
                colors[0] = '#94a3b8';
                return colors;
            }, [data.alliances]);

            const filteredGroupedCities = useMemo(() => {
                const pTargets = playerSearch.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);
                const aTargets = allianceSearch.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);

                const filtered = data.cities.filter(c => {
                    const matchOcean = selectedOcean === 'all' || c.ocean === selectedOcean;
                    if (!matchOcean) return false;
                    const matchP = pTargets.length > 0 ? pTargets.some(t => c.player_name.toLowerCase().includes(t)) : false;
                    const matchA = aTargets.length > 0 ? aTargets.some(t => c.alliance_name.toLowerCase().includes(t)) : false;
                    return (pTargets.length === 0 && aTargets.length === 0) ? true : (matchP || matchA);
                });

                const groups = {};
                filtered.forEach(c => {
                    const key = `${c.x},${c.y}`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(c);
                });
                return Object.values(groups);
            }, [data.cities, playerSearch, allianceSearch, selectedOcean]);

            // Groupement des villes par joueur pour la Sidebar (Style Image Uploadée)
            const clusterByPlayer = useMemo(() => {
                if (!selectedCluster) return {};
                return selectedCluster.reduce((acc, city) => {
                    if (!acc[city.player_name]) acc[city.player_name] = [];
                    acc[city.player_name].push(city);
                    return acc;
                }, {});
            }, [selectedCluster]);

            return (
                <div className="h-screen flex flex-col bg-slate-950 text-slate-200">
                    <div className="bg-slate-900 p-3 border-b border-slate-800 flex flex-wrap gap-3 items-center shadow-2xl z-20">
                        <h2 className="text-amber-400 font-black text-xl mr-4 tracking-tighter">⚔️ STRATÉGIE OP</h2>
                        <input placeholder="👤 Joueurs (ex: Jean, Paul)" className="bg-slate-800 border border-slate-700 px-3 py-1.5 rounded w-64 text-sm" value={playerSearch} onChange={e => setPlayerSearch(e.target.value)} />
                        <input placeholder="🛡️ Alliances" className="bg-slate-800 border border-slate-700 px-3 py-1.5 rounded w-64 text-sm" value={allianceSearch} onChange={e => setAllianceSearch(e.target.value)} />
                        <select className="bg-slate-800 border border-slate-700 px-3 py-1.5 rounded text-sm" value={selectedOcean} onChange={e => setSelectedOcean(e.target.value)}>
                            <option value="all">Tous Océans</option>
                            {[...Array(100).keys()].map(i => <option key={i} value={i.toString().padStart(2, '0')}>Océan {i.toString().padStart(2, '0')}</option>)}
                        </select>
                        <button onClick={() => setDistanceMode(!distanceMode)} className={`${distanceMode ? 'bg-green-600' : 'bg-slate-700'} px-4 py-1.5 rounded font-bold text-sm`}>📏 DISTANCE</button>
                    </div>

                    <div className="flex-1 flex overflow-hidden">
                        {/* Map Area */}
                        <div className="flex-1 relative bg-slate-950 overflow-hidden">
                            <svg ref={mapRef} className="w-full h-full map-container"
                                onMouseDown={(e) => {
                                    if(e.button !== 0) return;
                                    const sX = e.clientX - transform.x, sY = e.clientY - transform.y;
                                    const move = (m) => setTransform(t => ({...t, x: m.clientX - sX, y: m.clientY - sY}));
                                    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
                                    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
                                }}
                                onWheel={(e) => setTransform(t => ({...t, scale: Math.max(0.1, Math.min(20, t.scale * (e.deltaY > 0 ? 0.9 : 1.1)))}))}
                            >
                                <g style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})` }}>
                                    {/* Grille */}
                                    {[...Array(11).keys()].map(i => (
                                        <React.Fragment key={i}>
                                            <line x1={i*100} y1="0" x2={i*100} y2="1000" stroke="#1e293b" strokeWidth="0.5" />
                                            <line x1="0" y1={i*100} x2="1000" y2={i*100} stroke="#1e293b" strokeWidth="0.5" />
                                            <text x={i*100 + 2} y="15" fill="#334155" fontSize="10" fontWeight="bold">{i}0</text>
                                        </React.Fragment>
                                    ))}
                                    {filteredGroupedCities.map((group, idx) => (
                                        <g key={idx} onClick={() => setSelectedCluster(group)} className="cursor-pointer">
                                            <circle cx={group[0].x} cy={group[0].y} r={4/Math.sqrt(transform.scale)} fill={allianceColors[group[0].alliance_id]} stroke={selectedCluster?.[0].x === group[0].x ? "white" : "black"} strokeWidth={0.5/transform.scale} />
                                            {group.length > 1 && (
                                                <text x={group[0].x} y={group[0].y} textAnchor="middle" dy="0.3em" fill="white" fontSize={5/transform.scale} fontWeight="bold" style={{paintOrder: 'stroke', stroke: '#000', strokeWidth: 1/transform.scale}}>
                                                    {group.length}
                                                </text>
                                            )}
                                        </g>
                                    ))}
                                </g>
                            </svg>
                        </div>

                        {/* Sidebar Style Image Uploadée */}
                        <div className="w-80 bg-[#1e293b] border-l border-slate-800 flex flex-col shadow-2xl overflow-hidden">
                            <div className="p-4 overflow-y-auto custom-scrollbar flex-1 space-y-4">
                                {selectedCluster ? (
                                    <>
                                        <div className="bg-[#2d3748] p-4 rounded-lg shadow-inner">
                                            <h3 className="text-white font-bold text-base mb-1">Total Villes dans le Cluster:</h3>
                                            <p className="text-amber-400 font-bold text-3xl mb-2">{selectedCluster.length}</p>
                                            <p className="text-slate-300 text-sm">Océan: {selectedCluster[0].ocean}</p>
                                            <div className="border-t border-slate-600 mt-2 pt-2 text-xs">
                                                Alliance dominante: <span className="font-bold text-amber-400">{selectedCluster[0].alliance_name}</span>
                                            </div>
                                        </div>

                                        <div className="bg-[#2d3748] p-4 rounded-lg flex flex-col h-full max-h-[60vh]">
                                            <h3 className="text-white font-bold text-base mb-3">Liste des Villes:</h3>
                                            <div className="overflow-y-auto custom-scrollbar pr-2 space-y-4">
                                                {Object.entries(clusterByPlayer).map(([playerName, playerCities]) => (
                                                    <div key={playerName} className="border-b border-slate-600 pb-3 last:border-0">
                                                        <div className="text-amber-400 font-bold text-sm mb-1">{playerName}</div>
                                                        <div className="space-y-1.5">
                                                            {playerCities.map(city => (
                                                                <div key={city.id} className="text-[11px] leading-tight">
                                                                    <div className="text-slate-100 truncate font-medium">
                                                                        {city.name} (Emplacement {city.island_pos}) / ({city.points.toLocaleString('fr-FR')} pts)
                                                                    </div>
                                                                    <div className="text-amber-500 font-semibold text-[10px]">
                                                                        [{city.alliance_name}]
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center py-20 text-slate-500">
                                        <p className="text-sm italic">Cliquez sur un point de la carte pour voir les détails de l'île.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<GrepolisMap />, document.getElementById('root'));
    </script>
</body>
</html>
