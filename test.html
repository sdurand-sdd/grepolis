<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Tactique des Villes - Grepolis</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        .map-container { cursor: grab; touch-action: none; }
        .map-container:active { cursor: grabbing; }
        .distance-line { stroke-dasharray: 5,5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
        .map-wrapper { height: 100%; min-height: 35vh; }
        @media (max-width: 767px) { 
            .sidebar { max-height: 55vh; width: 100%; }
            .main-content { overflow-y: auto; display: flex; flex-direction: column; }
            .map-wrapper { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="root" class="main-content h-screen"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useEffect, useRef } = React;

        const calculateDistance = (x1, y1, x2, y2) => {
            return Math.sqrt(Math.pow(x1 - x2, 2) + Math.pow(y1 - y2, 2)).toFixed(2);
        };

        const getGrepolisOcean = (x, y) => {
            const oceanX = Math.floor(x / 100).toString(); 
            const oceanY = Math.floor(y / 100).toString();
            return oceanX.padStart(1, '0') + oceanY.padStart(1, '0'); 
        };
        
        const decodeName = (str) => {
            if (!str) return str;
            try {
                return decodeURIComponent(str.trim().replace(/\+/g, ' '));
            } catch (e) {
                return str.trim().replace(/\+/g, ' ');
            }
        };

        const parseData = (text, headers) => {
            const lines = text.trim().split('\n').filter(line => line.trim() !== '' && !line.startsWith('#'));
            if (lines.length === 0) return [];
            
            return lines.map(line => {
                const values = line.split(','); 
                const obj = {};
                headers.forEach((header, i) => {
                    const value = values[i];
                    const isNumeric = (header.endsWith('_id') || ['id', 'x', 'y', 'points', 'island_pos', 'towns', 'members', 'rank', 'off_rank', 'off_points', 'def_rank', 'def_points'].includes(header));
                    obj[header] = isNumeric ? (Number(value) || 0) : decodeName(value);
                });
                if (Object.keys(obj).length !== headers.length) return null;
                return obj;
            }).filter(obj => obj !== null);
        };

        const fetchData = async () => {
            try {
                const [alliancesRes, playersRes, townsRes, updateRes] = await Promise.all([
                    fetch('alliances.txt'),
                    fetch('players.txt'),
                    fetch('towns.txt'),
                    fetch('last_update.txt'),
                ]);

                if (!alliancesRes.ok || !playersRes.ok || !townsRes.ok) {
                    throw new Error("Erreur de chargement des fichiers serveurs.");
                }

                const [alliancesText, playersText, townsText, updateText] = await Promise.all([
                    alliancesRes.text(),
                    playersRes.text(),
                    townsRes.text(),
                    updateRes.ok ? updateRes.text() : 'Date inconnue',
                ]);

                const alliancesHeaders = ['id', 'name', 'points', 'towns', 'members'];
                const playersHeaders = ['id', 'name', 'alliance_id', 'points', 'rank', 'towns', 'off_rank', 'off_points', 'def_rank', 'def_points'];
                const townsHeaders = ['id', 'player_id', 'name', 'x', 'y', 'island_pos', 'points']; 

                const alliances = parseData(alliancesText, alliancesHeaders);
                const players = parseData(playersText, playersHeaders);
                const towns = parseData(townsText, townsHeaders);
                
                const lastUpdate = updateText.trim().split('\n')[0];

                const allianceMap = new Map(alliances.map(a => [a.id, a]));
                const playerMap = new Map(players.map(p => [p.id, {
                    ...p,
                    alliance_name: allianceMap.get(p.alliance_id)?.name || 'Sans alliance',
                    alliance_members: allianceMap.get(p.alliance_id)?.members || 0
                }]));

                const mergedCities = towns.map(town => {
                    if (town.points === 0) return null;

                    if (town.player_id === 0) {
                        return {
                            ...town,
                            ocean: getGrepolisOcean(town.x, town.y),
                            player_name: 'Ville Fantôme',
                            isGhost: true,
                            alliance_name: 'Aucune',
                            player_points: 0,
                            alliance_id: 0
                        };
                    }

                    const player = playerMap.get(town.player_id);
                    if (!player) return null;

                    return {
                        ...town,
                        ocean: getGrepolisOcean(town.x, town.y), 
                        player_name: player.name,
                        player_id: player.id,
                        player_points: player.points,
                        player_towns_count: player.towns,
                        alliance_id: player.alliance_id,
                        alliance_name: player.alliance_name,
                        alliance_members: player.alliance_members,
                        player_off_points: player.off_points,
                        player_def_points: player.def_points,
                        isGhost: false
                    };
                }).filter(c => c !== null);

                return { mergedCities, alliances, lastUpdate };

            } catch (error) {
                console.error(error);
                throw new Error("Erreur lors de la récupération des fichiers.");
            }
        };

        const generateAllianceColors = (alliances) => {
            const colors = {};
            alliances.forEach(alliance => {
                const hueSeed = Math.abs(alliance.id * 57) % 360; 
                colors[alliance.id] = `hsl(${hueSeed}, 85%, 60%)`; 
            });
            colors[0] = '#94a3b8'; 
            return colors;
        };

        // --- COMPOSANT PRINCIPAL ---

        const GrepolisMap = () => {
            const [cities, setCities] = useState([]);
            const [alliances, setAlliances] = useState([]);
            const [lastUpdate, setLastUpdate] = useState(null);
            const [loading, setLoading] = useState(true);
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [initialPinchDistance, setInitialPinchDistance] = useState(null); 
            const [initialScale, setInitialScale] = useState(1);
            
            const [citySearch, setCitySearch] = useState(''); 
            const [playerSearch, setPlayerSearch] = useState(''); 
            const [selectedOcean, setSelectedOcean] = useState('all');
            
            const [hoveredCity, setHoveredCity] = useState(null);
            const [selectedCity, setSelectedCity] = useState(null);
            const [distanceMode, setDistanceMode] = useState(false);
            const [citiesForDistance, setCitiesForDistance] = useState([]);
            const [dataError, setDataError] = useState(null);
            
            const mapRef = useRef(null); 

            const allianceColors = useMemo(() => generateAllianceColors(alliances), [alliances]);

            const filteredCities = useMemo(() => {
                const cityQuery = citySearch.trim().toLowerCase();
                const playerQuery = playerSearch.trim().toLowerCase();

                return cities.filter(city => {
                    const matchCity = cityQuery === '' || city.name.toLowerCase().includes(cityQuery);
                    const matchPlayer = playerQuery === '' || city.player_name.toLowerCase().includes(playerQuery);
                    const matchOcean = selectedOcean === 'all' || city.ocean === selectedOcean;
                    return matchCity && matchPlayer && matchOcean;
                });
            }, [cities, citySearch, playerSearch, selectedOcean]);

            const groupedByIsland = useMemo(() => {
                const groups = {};
                filteredCities.forEach(city => {
                    const key = `${city.x},${city.y}`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(city);
                });
                return groups;
            }, [filteredCities]);

            const mapBounds = useMemo(() => {
                if (filteredCities.length === 0) return { minX: 0, maxX: 1000, minY: 0, maxY: 1000 };
                const xs = filteredCities.map(c => c.x);
                const ys = filteredCities.map(c => c.y);
                return { 
                    minX: Math.max(0, Math.min(...xs) - 25), 
                    maxX: Math.min(1000, Math.max(...xs) + 25), 
                    minY: Math.max(0, Math.min(...ys) - 25), 
                    maxY: Math.min(1000, Math.max(...ys) + 25) 
                };
            }, [filteredCities]);

            const zoomToOccupiedAreas = useCallback((bounds = mapBounds) => {
                if (cities.length === 0 || !mapRef.current) return;
                
                const width = bounds.maxX - bounds.minX;
                const height = bounds.maxY - bounds.minY;
                const mapContainer = mapRef.current.closest('.map-wrapper');
                if (!mapContainer) return;

                const mapWidth = mapContainer.offsetWidth; 
                const mapHeight = mapContainer.offsetHeight;

                const scaleX = mapWidth / width; 
                const scaleY = mapHeight / height; 
                
                const scale = Math.min(scaleX, scaleY, 15); 

                const centerX = (bounds.minX + bounds.maxX) / 2;
                const centerY = (bounds.minY + bounds.maxY) / 2;
                
                setTransform({
                    x: (mapWidth / 2) - centerX * scale,
                    y: (mapHeight / 2) - centerY * scale,
                    scale: Math.max(0.1, scale)
                });
            }, [cities.length, mapBounds]);

            const handleWheel = useCallback((e) => {
                e.preventDefault(); 
                const scaleFactor = e.deltaY > 0 ? 0.85 : 1.15;
                const mapContainer = mapRef.current.closest('.map-wrapper');
                const rect = mapContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                setTransform(prev => {
                    const newScale = Math.max(0.1, Math.min(40, prev.scale * scaleFactor));
                    return {
                        x: mouseX - (mouseX - prev.x) * (newScale / prev.scale),
                        y: mouseY - (mouseY - prev.y) * (newScale / prev.scale),
                        scale: newScale
                    };
                });
            }, []);
            
            useEffect(() => {
                const mapElement = mapRef.current;
                if (mapElement) {
                    mapElement.addEventListener('wheel', handleWheel, { passive: false });
                    return () => mapElement.removeEventListener('wheel', handleWheel);
                }
            }, [handleWheel, loading]); 

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const { mergedCities, alliances, lastUpdate } = await fetchData();
                        setCities(mergedCities);
                        setAlliances(alliances);
                        setLastUpdate(lastUpdate);
                    } catch (err) {
                        setDataError(err.message);
                    } finally { 
                        setLoading(false); 
                    }
                };
                loadData();
            }, []);
            
            useEffect(() => {
                if (!loading && cities.length > 0) {
                    zoomToOccupiedAreas(mapBounds);
                }
            }, [selectedOcean, loading]);

            const oceans = useMemo(() => {
                const list = [];
                for(let i=0; i<100; i++) {
                    list.push(i.toString().padStart(2, '0'));
                }
                return list;
            }, []);

            const handleMouseDown = useCallback((e) => {
                if (e.button === 2) return;
                setIsDragging(true);
                setDragStart({ x: e.clientX - transform.x, y: e.clientY - transform.y });
            }, [transform]);

            const handleMouseMove = useCallback((e) => {
                if (!isDragging || initialPinchDistance !== null) return;
                setTransform(prev => ({ ...prev, x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }));
            }, [isDragging, dragStart, initialPinchDistance]);

            const handleMouseUp = useCallback(() => { setIsDragging(false); }, []);
            
            const getTouchDistance = (touches) => {
                return Math.sqrt(Math.pow(touches[0].clientX - touches[1].clientX, 2) + Math.pow(touches[0].clientY - touches[1].clientY, 2));
            };

            const handleTouchStart = useCallback((e) => {
                if (e.touches.length === 2) {
                    setInitialPinchDistance(getTouchDistance(e.touches));
                    setInitialScale(transform.scale);
                    setIsDragging(false);
                } else if (e.touches.length === 1) {
                    setIsDragging(true);
                    setInitialPinchDistance(null);
                    setDragStart({ x: e.touches[0].clientX - transform.x, y: e.touches[0].clientY - transform.y });
                }
            }, [transform]);

            const handleTouchMove = useCallback((e) => {
                if (e.touches.length === 2 && initialPinchDistance !== null) {
                    e.preventDefault();
                    const currentDistance = getTouchDistance(e.touches);
                    const scaleFactor = currentDistance / initialPinchDistance;
                    let newScale = Math.max(0.1, Math.min(40, initialScale * scaleFactor));
                    const touchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const touchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                    setTransform(prev => ({
                        x: touchCenterX - (touchCenterX - prev.x) * (newScale / prev.scale),
                        y: touchCenterY - (touchCenterY - prev.y) * (newScale / prev.scale),
                        scale: newScale
                    }));
                } else if (e.touches.length === 1 && isDragging) {
                    setTransform(prev => ({ ...prev, x: e.touches[0].clientX - dragStart.x, y: e.touches[0].clientY - dragStart.y }));
                }
            }, [isDragging, dragStart, initialPinchDistance, initialScale]);

            const handleCityClick = useCallback((e, city) => {
                if (isDragging) return; 
                if (distanceMode) {
                    setCitiesForDistance(prev => {
                        if (prev.length === 0) return [city];
                        if (prev.length === 1) {
                            if (prev[0].id === city.id) return []; 
                            return [...prev, city];
                        }
                        return [city];
                    });
                } else {
                    setSelectedCity(prev => (prev && prev.id === city.id) ? null : city);
                }
            }, [distanceMode, isDragging]);

            const renderOceanSquares = useCallback(() => {
                const squares = [];
                for (let x = 0; x < 10; x++) {
                    for (let y = 0; y < 10; y++) {
                        const oceanNum = getGrepolisOcean(x * 100 + 1, y * 100 + 1);
                        const isSelected = selectedOcean === oceanNum;
                        const isEven = (x % 2 === 0) === (y % 2 === 0);
                        squares.push(
                            <g key={oceanNum}>
                                <rect 
                                    x={x * 100} y={y * 100} width={100} height={100} 
                                    fill={isSelected ? '#1e293b' : (isEven ? '#1e3a5f' : '#2d4a6f')} 
                                    stroke="#0f172a" strokeWidth="0.2" 
                                    opacity={selectedOcean === 'all' || isSelected ? 1 : 0.1}
                                />
                                <text 
                                    x={x * 100 + 50} y={y * 100 + 50} textAnchor="middle" dy="0.35em" 
                                    fill={isSelected ? '#f59e0b' : '#64748b'} fontSize="10" fontWeight="bold"
                                    opacity={selectedOcean === 'all' || isSelected ? 0.6 : 0.05}
                                >
                                    {oceanNum}
                                </text>
                            </g>
                        );
                    }
                }
                return squares;
            }, [selectedOcean]);

            const renderDistanceLines = useCallback(() => {
                if (citiesForDistance.length < 2) return null;
                const [city1, city2] = citiesForDistance;
                
                // Calcul du positionnement exact de l'atoll pour la ligne
                const islandRadius = 2.8;
                const angle1 = ((city1.island_pos - 1) * 2 * Math.PI) / 20 - (Math.PI / 2);
                const cx1 = city1.x + (city1.island_pos > 0 ? islandRadius * Math.cos(angle1) : 0);
                const cy1 = city1.y + (city1.island_pos > 0 ? islandRadius * Math.sin(angle1) : 0);

                const angle2 = ((city2.island_pos - 1) * 2 * Math.PI) / 20 - (Math.PI / 2);
                const cx2 = city2.x + (city2.island_pos > 0 ? islandRadius * Math.cos(angle2) : 0);
                const cy2 = city2.y + (city2.island_pos > 0 ? islandRadius * Math.sin(angle2) : 0);

                const dist = calculateDistance(city1.x, city1.y, city2.x, city2.y);
                return (
                    <g>
                        <line x1={cx1} y1={cy1} x2={cx2} y2={cy2} stroke="#10b981" strokeWidth={1.2 / transform.scale} className="distance-line" />
                        <text x={(cx1 + cx2) / 2} y={(cy1 + cy2) / 2} textAnchor="middle" dy="-0.5em" fill="#10b981" fontSize={Math.max(1.2, 11 / transform.scale)} fontWeight="bold" style={{ pointerEvents: 'none', textShadow: '0 0 2px #0f172a' }}>{dist} unités</text>
                    </g>
                );
            }, [citiesForDistance, transform.scale]);

            const renderCities = useMemo(() => {
                const elements = [];
                const isSearching = playerSearch.trim() !== '' || citySearch.trim() !== '';

                Object.entries(groupedByIsland).forEach(([key, list]) => {
                    const [islandX, islandY] = key.split(',').map(Number);
                    
                    // Rayon d'atoll standard fixe et petit
                    const islandRadius = 2.8;

                    // Dessin de l'atoll d'ancrage en cas de fort zoom
                    if (transform.scale > 3) {
                        elements.push(
                            <circle 
                                key={`atoll-${key}`} cx={islandX} cy={islandY} r={islandRadius}
                                fill="none" stroke="#475569" strokeWidth={0.1 / transform.scale} strokeDasharray="0.3, 0.3" opacity="0.4"
                                style={{ pointerEvents: 'none' }}
                            />
                        );
                    }

                    list.forEach((city) => {
                        let finalX = islandX;
                        let finalY = islandY;

                        // Éclatement précis sur l'atoll
                        if (city.island_pos > 0) {
                            const angle = ((city.island_pos - 1) * 2 * Math.PI) / 20 - (Math.PI / 2);
                            finalX = islandX + islandRadius * Math.cos(angle);
                            finalY = islandY + islandRadius * Math.sin(angle);
                        }

                        // TAILLE BEAUCOUP PLUS PETITE ET SCALÉE
                        // Base fixe très fine (0.35) + amortisseur de zoom pour rester lisible sans bloquer la vue
                        let radius = 0.35 + (1.2 / transform.scale);
                        
                        let cityColor = allianceColors[city.alliance_id] || '#94a3b8';
                        let opacity = 0.85;

                        // Si recherche active, on met en valeur les cibles trouvées
                        if (isSearching) {
                            const matchSearch = (playerSearch.trim() !== '' && city.player_name.toLowerCase().includes(playerSearch.toLowerCase())) ||
                                                (citySearch.trim() !== '' && city.name.toLowerCase().includes(citySearch.toLowerCase()));
                            if (!matchSearch) {
                                opacity = 0.15;
                                radius = 0.2 + (0.5 / transform.scale);
                            } else {
                                radius = radius * 1.3;
                                opacity = 1;
                            }
                        }

                        if (city.isGhost) {
                            cityColor = '#eab308'; // Jaune fantôme
                        }

                        const isHovered = hoveredCity && hoveredCity.id === city.id;
                        const isSelected = selectedCity && selectedCity.id === city.id;
                        const isInDistance = citiesForDistance.some(c => c.id === city.id);

                        if (isSelected || isHovered || isInDistance) {
                            radius = radius * 1.5;
                            opacity = 1;
                        }

                        elements.push(
                            <g key={`city-${city.id}`}>
                                {transform.scale > 8 && (
                                    <line 
                                        x1={islandX} y1={islandY} x2={finalX} y2={finalY} 
                                        stroke="#475569" strokeWidth={0.05 / transform.scale} opacity="0.2" style={{ pointerEvents: 'none' }}
                                    />
                                )}
                                <circle 
                                    cx={finalX} cy={finalY} r={radius} fill={cityColor} 
                                    stroke={isInDistance ? '#10b981' : (isSelected || isHovered ? '#ffffff' : '#0f172a')} 
                                    strokeWidth={isSelected || isHovered || isInDistance ? Math.max(0.2, 0.8 / transform.scale) : Math.max(0.05, 0.2 / transform.scale)}
                                    opacity={opacity}
                                    onMouseEnter={() => setHoveredCity(city)}
                                    onMouseLeave={() => setHoveredCity(null)}
                                    onClick={(e) => handleCityClick(e, city)}
                                    onTouchEnd={(e) => handleCityClick(e, city)} 
                                    style={{ cursor: 'pointer' }}
                                />
                                {(isHovered || isSelected) && transform.scale > 4 && (
                                    <g style={{ pointerEvents: 'none' }}>
                                        <text x={finalX} y={finalY - (3 / transform.scale)} textAnchor="middle" fill="#fbbf24" fontSize={Math.max(1.2, 7 / transform.scale)} fontWeight="bold" style={{ textShadow: '0 0 2px #0f172a' }}>
                                            {city.name}
                                        </text>
                                        <text x={finalX} y={finalY - (1.2 / transform.scale)} textAnchor="middle" fill="#e2e8f0" fontSize={Math.max(0.9, 5 / transform.scale)} style={{ textShadow: '0 0 2px #0f172a' }}>
                                            {city.player_name} [{city.island_pos}]
                                        </text>
                                    </g>
                                )}
                            </g>
                        );
                    });
                });

                return elements;
            }, [groupedByIsland, hoveredCity, selectedCity, playerSearch, citySearch, citiesForDistance, transform.scale, allianceColors, handleCityClick]);

            if (loading) {
                return (
                    <div className="w-full h-screen bg-slate-900 flex items-center justify-center text-white font-semibold">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-500 mx-auto mb-4"></div>
                            Cartographie de l'archipel en cours...
                        </div>
                    </div>
                );
            }

            if (dataError) {
                return (
                    <div className="w-full h-screen bg-slate-900 flex items-center justify-center text-red-400 p-4 text-center">
                        <div>
                            ⚠️ Impossible de générer la carte tactique.<br/>
                            <span className="text-sm text-slate-400">{dataError}</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="w-full h-screen bg-slate-900 flex flex-col">
                    <div className="bg-slate-800 p-4 shadow-lg sticky top-0 z-10 border-b border-slate-700">
                        <h1 className="text-xl font-bold text-amber-400 mb-3 flex items-center gap-2">
                            🗺️ Carte Spatiale des Alliances (Optimisée)
                        </h1>
                        <div className="flex flex-wrap items-center gap-3">
                            <div className="w-full sm:w-auto">
                                <input 
                                    type="text" placeholder="👤 Filtrer par joueur..."
                                    value={playerSearch} onChange={(e) => setPlayerSearch(e.target.value)}
                                    className="pl-4 pr-4 py-2 bg-slate-700 text-white rounded-lg w-full sm:w-48 border border-slate-600 focus:outline-none focus:border-amber-400 text-sm"
                                />
                            </div>
                            
                            <div className="w-full sm:w-auto">
                                <input 
                                    type="text" placeholder="🏛️ Filtrer par ville..."
                                    value={citySearch} onChange={(e) => setCitySearch(e.target.value)}
                                    className="pl-4 pr-4 py-2 bg-slate-700 text-white rounded-lg w-full sm:w-48 border border-slate-600 focus:outline-none focus:border-amber-400 text-sm"
                                />
                            </div>
                            
                            <select
                                value={selectedOcean} onChange={(e) => setSelectedOcean(e.target.value)}
                                className="bg-slate-700 text-white py-2 px-3 rounded-lg border border-slate-600 focus:outline-none focus:border-amber-400 w-full sm:w-40 text-sm"
                            >
                                <option value="all">Toutes mers</option>
                                {oceans.map(o => <option key={o} value={o}>Mer {o}</option>)}
                            </select>

                            <div className="flex flex-wrap gap-2 w-full sm:w-auto sm:ml-auto">
                                <button onClick={() => setDistanceMode(!distanceMode)} className={`px-4 py-2 rounded-lg font-semibold text-sm transition-colors ${distanceMode ? 'bg-green-600 text-white' : 'bg-slate-600 text-slate-300 hover:bg-slate-500'}`}>📏 {distanceMode ? 'Règle Active' : 'Règle'}</button>
                                <button onClick={() => zoomToOccupiedAreas()} className="px-4 py-2 bg-amber-500 text-slate-900 font-bold rounded-lg text-sm hover:bg-amber-400 transition-colors">🎯 Recadrer</button>
                                <button onClick={() => setTransform({ x: 0, y: 0, scale: 1 })} className="px-3 py-2 bg-slate-600 text-slate-300 rounded-lg text-sm hover:bg-slate-500">Reset</button>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden md:flex-row flex-col">
                        <div className="flex-1 relative overflow-hidden map-wrapper bg-[#111827]">
                            <svg 
                                ref={mapRef} viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet" className="w-full h-full map-container"
                                style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`, transformOrigin: 'top left' }}
                                onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
                                onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleMouseUp}
                            >
                                <g>
                                    {renderOceanSquares()}
                                    {renderDistanceLines()}
                                    {renderCities}
                                </g>
                            </svg>
                        </div>

                        <div className="w-full sm:w-80 p-4 bg-slate-800 text-slate-300 flex-shrink-0 overflow-y-auto sidebar border-l border-slate-700">
                            <h2 className="text-base font-bold text-white mb-3">Données d'Atoll</h2>
                            
                            {selectedCity ? (
                                <div className="bg-slate-900 p-3 rounded-lg space-y-2 text-xs">
                                    <h3 className="font-bold text-amber-400 border-b border-slate-800 pb-1 text-sm truncate">
                                        🏛️ {selectedCity.name}
                                    </h3>
                                    <div>📍 Coordonnées : <strong>{selectedCity.x}, {selectedCity.y}</strong> (Mer {selectedCity.ocean})</div>
                                    <div>⚓ Ancrage côtier : <strong>Position {selectedCity.island_pos} / 20</strong></div>
                                    <div>📊 Points Ville : {selectedCity.points.toLocaleString('fr-FR')} pts</div>
                                    <div className="pt-2 mt-2 border-t border-slate-800">
                                        Joueur : <span className="font-bold text-white">{selectedCity.player_name}</span>
                                    </div>
                                    {!selectedCity.isGhost && (
                                        <>
                                            <div className="truncate">Alliance : <span className="font-semibold text-indigo-400">{selectedCity.alliance_name}</span></div>
                                            <div>Points de combat Off : {selectedCity.player_off_points?.toLocaleString('fr-FR')}</div>
                                            <div>Points de combat Def : {selectedCity.player_def_points?.toLocaleString('fr-FR')}</div>
                                        </>
                                    )}
                                </div>
                            ) : (
                                <p className="text-xs text-slate-400 italic bg-slate-900/50 p-3 rounded-lg">Cliquez sur une ville côtière pour isoler sa fiche technique d'alliance.</p>
                            )}

                            {alliances.length > 0 && (
                                <div className="mt-4 border-t border-slate-700 pt-3">
                                    <h4 className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">Couleurs Alliances</h4>
                                    <div className="max-h-48 overflow-y-auto space-y-1 text-xs pr-1">
                                        {alliances.sort((a,b) => b.points - a.points).slice(0, 15).map(all => (
                                            <div key={all.id} className="flex items-center justify-between py-0.5">
                                                <div className="flex items-center gap-2 truncate">
                                                    <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: allianceColors[all.id] }} />
                                                    <span className="truncate">{all.name}</span>
                                                </div>
                                                <span className="text-[10px] text-slate-500 font-mono">x{all.towns}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {lastUpdate && (
                                <div className="mt-6 text-[10px] text-slate-500 text-right">
                                    Données : {lastUpdate}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<GrepolisMap />, document.getElementById('root'));
    </script>
</body>
</html>
