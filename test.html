<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grepolis - Tactical Island Map (Position Réelle)</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        .map-container { cursor: grab; touch-action: none; }
        .map-container:active { cursor: grabbing; }
        .distance-line { stroke-dasharray: 5,5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
        .map-wrapper { height: 100%; min-height: 35vh; }
        @media (max-width: 767px) { 
            .sidebar { max-height: 55vh; width: 100%; }
            .main-content { overflow-y: auto; display: flex; flex-direction: column; }
            .map-wrapper { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="root" class="main-content h-screen"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useEffect, useRef } = React;

        const calculateDistance = (x1, y1, x2, y2) => {
            return Math.sqrt(Math.pow(x1 - x2, 2) + Math.pow(y1 - y2, 2)).toFixed(2);
        };

        const getGrepolisOcean = (x, y) => {
            const oceanX = Math.floor(x / 100).toString(); 
            const oceanY = Math.floor(y / 100).toString();
            return oceanX.padStart(1, '0') + oceanY.padStart(1, '0'); 
        };
        
        const decodeName = (str) => {
            if (!str) return str;
            try {
                return decodeURIComponent(str.trim().replace(/\+/g, ' '));
            } catch (e) {
                return str.trim().replace(/\+/g, ' ');
            }
        };

        const parseData = (text, headers) => {
            const lines = text.trim().split('\n').filter(line => line.trim() !== '' && !line.startsWith('#'));
            if (lines.length === 0) return [];
            
            return lines.map(line => {
                const values = line.split(','); 
                const obj = {};
                headers.forEach((header, i) => {
                    const value = values[i];
                    const isNumeric = (header.endsWith('_id') || ['id', 'x', 'y', 'points', 'island_pos', 'towns', 'members', 'rank', 'off_rank', 'off_points', 'def_rank', 'def_points'].includes(header));
                    obj[header] = isNumeric ? (Number(value) || 0) : decodeName(value);
                });
                if (Object.keys(obj).length !== headers.length) return null;
                return obj;
            }).filter(obj => obj !== null);
        };

        const fetchData = async () => {
            try {
                const [alliancesRes, playersRes, townsRes, updateRes] = await Promise.all([
                    fetch('alliances.txt'),
                    fetch('players.txt'),
                    fetch('towns.txt'),
                    fetch('last_update.txt'),
                ]);

                if (!alliancesRes.ok || !playersRes.ok || !townsRes.ok) {
                    throw new Error("Erreur de chargement des fichiers serveurs.");
                }

                const [alliancesText, playersText, townsText, updateText] = await Promise.all([
                    alliancesRes.text(),
                    playersRes.text(),
                    townsRes.text(),
                    updateRes.ok ? updateRes.text() : 'Date inconnue',
                ]);

                const alliancesHeaders = ['id', 'name', 'points', 'towns', 'members'];
                const playersHeaders = ['id', 'name', 'alliance_id', 'points', 'rank', 'towns', 'off_rank', 'off_points', 'def_rank', 'def_points'];
                const townsHeaders = ['id', 'player_id', 'name', 'x', 'y', 'island_pos', 'points']; 

                const alliances = parseData(alliancesText, alliancesHeaders);
                const players = parseData(playersText, playersHeaders);
                const towns = parseData(townsText, townsHeaders);
                
                const lastUpdate = updateText.trim().split('\n')[0];

                const allianceMap = new Map(alliances.map(a => [a.id, a]));
                const playerMap = new Map(players.map(p => [p.id, {
                    ...p,
                    alliance_name: allianceMap.get(p.alliance_id)?.name || 'Sans alliance',
                    alliance_members: allianceMap.get(p.alliance_id)?.members || 0
                }]));

                const mergedCities = towns.map(town => {
                    if (town.points === 0) return null;

                    if (town.player_id === 0) {
                        return {
                            ...town,
                            ocean: getGrepolisOcean(town.x, town.y),
                            player_name: 'Ville Fantôme',
                            isGhost: true,
                            alliance_name: 'Aucune',
                            player_points: 0
                        };
                    }

                    const player = playerMap.get(town.player_id);
                    if (!player) {
                        return {
                            ...town,
                            ocean: getGrepolisOcean(town.x, town.y),
                            player_name: 'Joueur inconnu',
                            isGhost: true,
                            alliance_name: 'Aucune',
                            player_points: 0
                        };
                    }

                    return {
                        ...town,
                        ocean: getGrepolisOcean(town.x, town.y), 
                        player_name: player.name,
                        player_id: player.id,
                        player_points: player.points,
                        player_towns_count: player.towns,
                        alliance_id: player.alliance_id,
                        alliance_name: player.alliance_name,
                        alliance_members: player.alliance_members,
                        player_off_points: player.off_points,
                        player_def_points: player.def_points,
                        isGhost: false
                    };
                }).filter(c => c !== null);

                return { mergedCities, alliances, lastUpdate };

            } catch (error) {
                console.error(error);
                throw new Error("Erreur lors de la récupération des fichiers.");
            }
        };

        // --- COMPOSANT PRINCIPAL ---

        const GrepolisTacticalMap = () => {
            const [cities, setCities] = useState([]);
            const [lastUpdate, setLastUpdate] = useState(null);
            const [loading, setLoading] = useState(true);
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [initialPinchDistance, setInitialPinchDistance] = useState(null); 
            const [initialScale, setInitialScale] = useState(1);
            
            const [attackerSearch, setAttackerSearch] = useState(''); 
            const [defenderSearch, setDefenderSearch] = useState(''); 
            
            const [selectedOcean, setSelectedOcean] = useState('all');
            const [showGhosts, setShowGhosts] = useState(true); 
            const [hoveredCity, setHoveredCity] = useState(null);
            const [selectedCity, setSelectedCity] = useState(null);
            const [distanceMode, setDistanceMode] = useState(false);
            const [citiesForDistance, setCitiesForDistance] = useState([]);
            const [dataError, setDataError] = useState(null);
            
            const mapRef = useRef(null); 

            const displayableCities = useMemo(() => {
                return cities.filter(city => {
                    const matchOcean = selectedOcean === 'all' || city.ocean === selectedOcean;
                    const matchGhost = showGhosts ? true : !city.isGhost;
                    return matchOcean && matchGhost;
                });
            }, [cities, selectedOcean, showGhosts]);

            const groupedCities = useMemo(() => {
                const groups = {};
                displayableCities.forEach(city => {
                    const key = `${city.x},${city.y}`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(city);
                });
                return groups;
            }, [displayableCities]);

            const mapBounds = useMemo(() => {
                const atkQuery = attackerSearch.trim().toLowerCase();
                const defQuery = defenderSearch.trim().toLowerCase();
                
                if (atkQuery !== '' || defQuery !== '') {
                    const targets = cities.filter(c => !c.isGhost && (
                        (atkQuery !== '' && c.player_name.toLowerCase().includes(atkQuery)) ||
                        (defQuery !== '' && c.player_name.toLowerCase().includes(defQuery))
                    ));

                    if (targets.length > 0) {
                        const xs = targets.map(c => c.x);
                        const ys = targets.map(c => c.y);
                        return { 
                            minX: Math.max(0, Math.min(...xs) - 35), 
                            maxX: Math.min(1000, Math.max(...xs) + 35), 
                            minY: Math.max(0, Math.min(...ys) - 35), 
                            maxY: Math.min(1000, Math.max(...ys) + 35) 
                        };
                    }
                }

                if (selectedOcean !== 'all') {
                    const oX = parseInt(selectedOcean.charAt(0)) * 100;
                    const oY = parseInt(selectedOcean.charAt(1)) * 100;
                    return { minX: oX, maxX: oX + 100, minY: oY, maxY: oY + 100 };
                }
                
                return { minX: 0, maxX: 1000, minY: 0, maxY: 1000 };
            }, [cities, attackerSearch, defenderSearch, selectedOcean]);

            const zoomToOccupiedAreas = useCallback((bounds = mapBounds) => {
                if (cities.length === 0 || !mapRef.current) return;
                
                const width = bounds.maxX - bounds.minX;
                const height = bounds.maxY - bounds.minY;
                const mapContainer = mapRef.current.closest('.map-wrapper');
                if (!mapContainer) return;

                const mapWidth = mapContainer.offsetWidth; 
                const mapHeight = mapContainer.offsetHeight;

                const scaleX = mapWidth / width; 
                const scaleY = mapHeight / height; 
                
                const maxZoom = (attackerSearch.trim() !== '' || defenderSearch.trim() !== '') ? 16 : (selectedOcean !== 'all' ? 6 : 12);
                const scale = Math.min(scaleX, scaleY, maxZoom); 

                const centerX = (bounds.minX + bounds.maxX) / 2;
                const centerY = (bounds.minY + bounds.maxY) / 2;
                
                setTransform({
                    x: (mapWidth / 2) - centerX * scale,
                    y: (mapHeight / 2) - centerY * scale,
                    scale: Math.max(0.3, scale)
                });
            }, [cities.length, attackerSearch, defenderSearch, selectedOcean]);

            const handleWheel = useCallback((e) => {
                e.preventDefault(); 
                const scaleFactor = e.deltaY > 0 ? 0.9 : 1.1;
                const mapContainer = mapRef.current.closest('.map-wrapper');
                const rect = mapContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                setTransform(prev => {
                    const newScale = Math.max(0.3, Math.min(45, prev.scale * scaleFactor));
                    return {
                        x: mouseX - (mouseX - prev.x) * (newScale / prev.scale),
                        y: mouseY - (mouseY - prev.y) * (newScale / prev.scale),
                        scale: newScale
                    };
                });
            }, []);
            
            useEffect(() => {
                const mapElement = mapRef.current;
                if (mapElement) {
                    mapElement.addEventListener('wheel', handleWheel, { passive: false });
                    return () => mapElement.removeEventListener('wheel', handleWheel);
                }
            }, [handleWheel, loading]); 

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const { mergedCities, lastUpdate } = await fetchData();
                        setCities(mergedCities);
                        setLastUpdate(lastUpdate);
                    } catch (err) {
                        setDataError(err.message);
                    } finally { 
                        setLoading(false); 
                    }
                };
                loadData();
            }, []);
            
            useEffect(() => {
                if (!loading && cities.length > 0) {
                    zoomToOccupiedAreas(mapBounds);
                }
            }, [attackerSearch, defenderSearch, selectedOcean, loading]);

            const oceans = useMemo(() => {
                const list = [];
                for(let i=0; i<100; i++) {
                    list.push(i.toString().padStart(2, '0'));
                }
                return list;
            }, []);

            const handleMouseDown = useCallback((e) => {
                if (e.button === 2) return;
                setIsDragging(true);
                setDragStart({ x: e.clientX - transform.x, y: e.clientY - transform.y });
            }, [transform]);

            const handleMouseMove = useCallback((e) => {
                if (!isDragging || initialPinchDistance !== null) return;
                setTransform(prev => ({ ...prev, x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }));
            }, [isDragging, dragStart, initialPinchDistance]);

            const handleMouseUp = useCallback(() => { setIsDragging(false); }, []);
            
            const getTouchDistance = (touches) => {
                return Math.sqrt(Math.pow(touches[0].clientX - touches[1].clientX, 2) + Math.pow(touches[0].clientY - touches[1].clientY, 2));
            };

            const handleTouchStart = useCallback((e) => {
                if (e.touches.length === 2) {
                    setInitialPinchDistance(getTouchDistance(e.touches));
                    setInitialScale(transform.scale);
                    setIsDragging(false);
                } else if (e.touches.length === 1) {
                    setIsDragging(true);
                    setInitialPinchDistance(null);
                    setDragStart({ x: e.touches[0].clientX - transform.x, y: e.touches[0].clientY - transform.y });
                }
            }, [transform]);

            const handleTouchMove = useCallback((e) => {
                if (e.touches.length === 2 && initialPinchDistance !== null) {
                    e.preventDefault();
                    const currentDistance = getTouchDistance(e.touches);
                    const scaleFactor = currentDistance / initialPinchDistance;
                    let newScale = Math.max(0.3, Math.min(45, initialScale * scaleFactor));
                    const touchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const touchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                    setTransform(prev => ({
                        x: touchCenterX - (touchCenterX - prev.x) * (newScale / prev.scale),
                        y: touchCenterY - (touchCenterY - prev.y) * (newScale / prev.scale),
                        scale: newScale
                    }));
                } else if (e.touches.length === 1 && isDragging) {
                    setTransform(prev => ({ ...prev, x: e.touches[0].clientX - dragStart.x, y: e.touches[0].clientY - dragStart.y }));
                }
            }, [isDragging, dragStart, initialPinchDistance, initialScale]);

            const handleCityClick = useCallback((e, city) => {
                if (isDragging) return; 
                if (distanceMode) {
                    setCitiesForDistance(prev => {
                        if (prev.length === 0) return [city];
                        if (prev.length === 1) {
                            if (prev[0].id === city.id) return []; 
                            return [...prev, city];
                        }
                        return [city];
                    });
                } else {
                    setSelectedCity(prev => (prev && prev.id === city.id) ? null : city);
                }
            }, [distanceMode, isDragging]);

            const renderOceanSquares = useCallback(() => {
                const squares = [];
                for (let x = 0; x < 10; x++) {
                    for (let y = 0; y < 10; y++) {
                        const oceanNum = getGrepolisOcean(x * 100 + 1, y * 100 + 1);
                        const isSelected = selectedOcean === oceanNum;
                        const isEven = (x % 2 === 0) === (y % 2 === 0);
                        squares.push(
                            <g key={oceanNum}>
                                <rect 
                                    x={x * 100} y={y * 100} width={100} height={100} 
                                    fill={isSelected ? '#1e293b' : (isEven ? '#1e3a5f' : '#2d4a6f')} 
                                    stroke={isSelected ? '#f59e0b' : '#0f172a'} 
                                    strokeWidth={isSelected ? '2' : '0.5'} 
                                    opacity={selectedOcean === 'all' || isSelected ? 1 : 0.1}
                                />
                                <text 
                                    x={x * 100 + 50} y={y * 100 + 50} textAnchor="middle" dy="0.35em" 
                                    fill={isSelected ? '#f59e0b' : '#64748b'} fontSize="11" fontWeight="bold"
                                    opacity={selectedOcean === 'all' || isSelected ? 0.8 : 0.05}
                                >
                                    {oceanNum}
                                </text>
                            </g>
                        );
                    }
                }
                return squares;
            }, [selectedOcean]);

            const renderDistanceLines = useCallback(() => {
                if (citiesForDistance.length < 2) return null;
                const [city1, city2] = citiesForDistance;
                const dist = calculateDistance(city1.x, city1.y, city2.x, city2.y);
                return (
                    <g>
                        <line x1={city1.x} y1={city1.y} x2={city2.x} y2={city2.y} stroke="#10b981" strokeWidth="1.5" className="distance-line" />
                        <text x={(city1.x + city2.x) / 2} y={(city1.y + city2.y) / 2} textAnchor="middle" dy="-0.5em" fill="#10b981" fontSize={Math.max(4, 13 / transform.scale)} fontWeight="bold" style={{ pointerEvents: 'none', textShadow: '0 0 3px #0f172a' }}>{dist}</text>
                    </g>
                );
            }, [citiesForDistance, transform.scale]);

            // POSITIONNEMENT SUR L'ÎLE VIA ISLAND_POS
            const renderCities = useMemo(() => {
                const atkActive = attackerSearch.trim() !== '';
                const defActive = defenderSearch.trim() !== '';
                const atkQuery = attackerSearch.toLowerCase();
                const defQuery = defenderSearch.toLowerCase();

                const elements = [];

                Object.entries(groupedCities).forEach(([key, list]) => {
                    const [islandX, islandY] = key.split(',').map(Number);
                    const totalCities = list.length;
                    
                    // Rayon fixe de la structure de l'atoll
                    const islandRadius = Math.max(1.8, 3.5 / Math.log(transform.scale + 1.2));

                    if (totalCities > 1 && transform.scale > 3) {
                        elements.push(
                            <ellipse 
                                key={`island-base-${key}`}
                                cx={islandX} cy={islandY} 
                                rx={islandRadius * 1.1} ry={islandRadius * 0.9}
                                fill="#273549" opacity="0.25" stroke="#475569" strokeWidth={0.15 / transform.scale}
                                style={{ pointerEvents: 'none' }}
                            />
                        );
                    }

                    list.forEach((city) => {
                        let finalX = islandX;
                        let finalY = islandY;

                        // Si l'île contient au moins un élément, on éclate la position via island_pos (basé sur 20 emplacements)
                        if (city.island_pos > 0) {
                            // On décale l'angle de départ (- Math.PI / 2) pour commencer l'emplacement 1 vers le haut de l'atoll
                            const angle = ((city.island_pos - 1) * 2 * Math.PI) / 20 - (Math.PI / 2);
                            finalX = islandX + islandRadius * Math.cos(angle);
                            finalY = islandY + islandRadius * Math.sin(angle);
                        }

                        const isAtk = !city.isGhost && atkActive && city.player_name.toLowerCase().includes(atkQuery);
                        const isDef = !city.isGhost && defActive && city.player_name.toLowerCase().includes(defQuery);

                        let cityColor = '#475569'; 
                        let radius = Math.max(0.6, 2.2 / transform.scale);
                        let opacity = 0.3;

                        if (isAtk && isDef) {
                            cityColor = '#d946ef'; 
                            radius = Math.max(1.6, 5.0 / transform.scale); 
                            opacity = 1;
                        } else if (isAtk) {
                            cityColor = '#06b6d4'; 
                            radius = Math.max(1.4, 4.2 / transform.scale);
                            opacity = 1;
                        } else if (isDef) {
                            cityColor = '#ef4444'; 
                            radius = Math.max(1.4, 4.2 / transform.scale);
                            opacity = 1;
                        } else if (city.isGhost) {
                            cityColor = '#fef08a'; 
                            radius = Math.max(0.9, 2.8 / transform.scale);
                            opacity = 0.85;
                        }

                        const isHovered = hoveredCity && hoveredCity.id === city.id;
                        const isSelected = selectedCity && selectedCity.id === city.id;

                        if (isSelected || isHovered) {
                            radius = radius * 1.4;
                            opacity = 1;
                        }

                        elements.push(
                            <g key={`city-${city.id}`}>
                                {transform.scale > 6 && (
                                    <line 
                                        x1={islandX} y1={islandY} x2={finalX} y2={finalY} 
                                        stroke="#475569" strokeWidth={0.1 / transform.scale} opacity="0.3"
                                    />
                                )}
                                <circle 
                                    cx={finalX} cy={finalY} r={radius} fill={cityColor} 
                                    stroke={isSelected || isHovered ? '#ffffff' : '#0f172a'} 
                                    strokeWidth={isSelected || isHovered ? Math.max(0.3, 1.0 / transform.scale) : Math.max(0.1, 0.3 / transform.scale)}
                                    opacity={opacity}
                                    onMouseEnter={() => setHoveredCity(city)}
                                    onMouseLeave={() => setHoveredCity(null)}
                                    onClick={(e) => handleCityClick(e, city)}
                                    onTouchEnd={(e) => handleCityClick(e, city)} 
                                    style={{ cursor: 'pointer' }}
                                />
                                {(isHovered || isSelected) && !distanceMode && transform.scale > 4 && (
                                    <g style={{ pointerEvents: 'none' }}>
                                        <text x={finalX} y={finalY - (4 / transform.scale)} textAnchor="middle" fill="#fbbf24" fontSize={Math.max(1.8, 6.5 / transform.scale)} fontWeight="bold" style={{ textShadow: '0 0 2px #0f172a' }}>
                                            {city.name}
                                        </text>
                                        <text x={finalX} y={finalY - (1.5 / transform.scale)} textAnchor="middle" fill="#e2e8f0" fontSize={Math.max(1.5, 5.0 / transform.scale)} style={{ textShadow: '0 0 2px #0f172a' }}>
                                            {city.player_name} [Pos {city.island_pos}]
                                        </text>
                                    </g>
                                )}
                            </g>
                        );
                    });
                });

                return elements;
            }, [groupedCities, hoveredCity, selectedCity, attackerSearch, defenderSearch, distanceMode, transform.scale, handleCityClick]);

            if (loading) {
                return (
                    <div className="w-full h-screen bg-slate-900 flex items-center justify-center text-white font-semibold">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-500 mx-auto mb-4"></div>
                            Synchronisation des ancrages côtiers (island_pos)...
                        </div>
                    </div>
                );
            }

            if (dataError) {
                return (
                    <div className="w-full h-screen bg-slate-900 flex items-center justify-center text-red-400 p-4 text-center">
                        <div>
                            ⚠️ Échec du chargement des fichiers serveurs (.txt)<br/>
                            <span className="text-sm text-slate-400">{dataError}</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="w-full h-screen bg-slate-900 flex flex-col">
                    <div className="bg-slate-800 p-4 shadow-lg sticky top-0 z-10 border-b border-slate-700">
                        <h1 className="text-xl font-bold text-cyan-400 mb-3 flex items-center gap-2">
                            ⚔️ Grepolis - Tactical Island Map
                        </h1>
                        <div className="flex flex-wrap items-center gap-3">
                            <div className="w-full sm:w-auto">
                                <input 
                                    type="text" placeholder="🔵 Attaquant (Moi / Allié)..."
                                    value={attackerSearch} onChange={(e) => setAttackerSearch(e.target.value)}
                                    className="pl-4 pr-4 py-2 bg-slate-700 text-white rounded-lg w-full sm:w-56 border border-cyan-600/50 focus:outline-none focus:border-cyan-400 font-medium"
                                />
                            </div>

                            <span className="text-slate-500 font-bold hidden sm:inline">VS</span>
                            
                            <div className="w-full sm:w-auto">
                                <input 
                                    type="text" placeholder="🔴 Défenseur (Cible à Off)..."
                                    value={defenderSearch} onChange={(e) => setDefenderSearch(e.target.value)}
                                    className="pl-4 pr-4 py-2 bg-slate-700 text-white rounded-lg w-full sm:w-56 border border-red-600/50 focus:outline-none focus:border-red-400 font-medium"
                                />
                            </div>
                            
                            <select
                                value={selectedOcean} onChange={(e) => setSelectedOcean(e.target.value)}
                                className="bg-slate-700 text-white py-2 px-3 rounded-lg border border-slate-600 focus:outline-none focus:border-amber-400 w-full sm:w-40"
                            >
                                <option value="all">Toutes mers</option>
                                {oceans.map(o => <option key={o} value={o}>Mer {o}</option>)}
                            </select>

                            <div className="flex flex-wrap gap-2 w-full lg:w-auto lg:ml-auto">
                                <button 
                                    onClick={() => setShowGhosts(!showGhosts)} 
                                    className={`flex-1 sm:flex-none px-3 py-2 rounded-lg font-semibold border transition-all duration-200 ${
                                        showGhosts 
                                            ? 'bg-slate-700 text-yellow-300 border-yellow-500/40 hover:bg-slate-600' 
                                            : 'bg-yellow-600 text-slate-900 border-transparent hover:bg-yellow-500 font-bold'
                                    }`}
                                >
                                    {showGhosts ? '💀 Masquer Fantômes' : '💀 Afficher Fantômes'}
                                </button>
                                <button onClick={() => zoomToOccupiedAreas(mapBounds)} className="flex-1 sm:flex-none px-4 py-2 bg-cyan-600 text-white rounded-lg font-semibold hover:bg-cyan-500 transition-colors">🎯 Recadrer</button>
                                <button onClick={() => setDistanceMode(!distanceMode)} className={`px-3 py-2 rounded-lg transition-colors ${distanceMode ? 'bg-green-600 text-white' : 'bg-slate-600 text-slate-300'}`}>📏 Règle</button>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden md:flex-row flex-col">
                        <div className="flex-1 relative overflow-hidden map-wrapper">
                            <svg 
                                ref={mapRef} viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet" className="w-full h-full map-container"
                                style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`, transformOrigin: 'top left' }}
                                onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
                                onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleMouseUp}
                            >
                                <g>
                                    {renderOceanSquares()}
                                    {renderDistanceLines()}
                                    {renderCities}
                                </g>
                            </svg>
                        </div>

                        <div className="w-full sm:w-80 p-4 bg-slate-800 text-slate-300 flex-shrink-0 overflow-y-auto sidebar border-l border-slate-700">
                            <h2 className="text-lg font-bold text-white mb-2">Légende Tactique</h2>
                            
                            <div className="bg-slate-900 p-3 rounded-lg mb-4 space-y-2 text-xs">
                                <div className="text-slate-400 italic mb-1 border-b border-slate-800 pb-1">Les emplacements respectent l'organisation d'ancrage côtière d'origine (1 à 20).</div>
                                <div className="flex items-center gap-2">
                                    <span className="w-3 h-3 rounded-full bg-[#d946ef] inline-block"></span>
                                    <span className="text-[#d946ef] font-bold">Ville en Conflit Direct</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="w-3 h-3 rounded-full bg-cyan-500 inline-block"></span>
                                    <span className="text-cyan-400 font-semibold">Ville Attaquant</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="w-3 h-3 rounded-full bg-red-500 inline-block"></span>
                                    <span className="text-red-400 font-semibold">Ville Défenseur</span>
                                </div>
                                {showGhosts && (
                                    <div className="flex items-center gap-2">
                                        <span className="w-3 h-3 rounded-full bg-yellow-200 inline-block"></span>
                                        <span className="text-yellow-200 font-semibold">Opportunité Fantôme</span>
                                    </div>
                                )}
                            </div>

                            <h2 className="text-base font-bold text-white mb-2 border-t border-slate-700 pt-3">Détails de la ville</h2>

                            {selectedCity ? (
                                <div className="bg-slate-700 p-3 rounded-lg space-y-2 text-sm">
                                    <h3 className="font-bold text-amber-300 border-b border-slate-600 pb-1">
                                        🏛️ {selectedCity.name}
                                    </h3>
                                    <div className="space-y-1 text-xs">
                                        <div>📍 Île : <strong>{selectedCity.x}, {selectedCity.y}</strong> (Mer {selectedCity.ocean})</div>
                                        <div>⚓ Position ancrage : <strong>{selectedCity.island_pos} / 20</strong></div>
                                        <div>📊 Points : {selectedCity.points.toLocaleString('fr-FR')}</div>
                                        <div className="pt-1 mt-2 border-t border-slate-600">
                                            Propriétaire : <span className="font-bold text-white">{selectedCity.player_name}</span>
                                        </div>
                                        {!selectedCity.isGhost && (
                                            <>
                                                <div>Alliance : {selectedCity.alliance_name}</div>
                                                <div>Points Joueur : {selectedCity.player_points?.toLocaleString('fr-FR')}</div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <p className="text-xs text-slate-400 italic">Cliquez sur une ville de l'atoll pour obtenir sa fiche complète et sa position exacte sur les côtes.</p>
                            )}

                            {lastUpdate && (
                                <div className="mt-6 text-[10px] text-slate-500 text-right">
                                    Base à jour : {lastUpdate}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<GrepolisTacticalMap />, document.getElementById('root'));
    </script>
</body>
</html>
